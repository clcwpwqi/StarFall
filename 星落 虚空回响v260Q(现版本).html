 <style>
 /* ===== CSS 变量统一 ===== */
 :root {
  --glass-bg: rgba(80,140,200,0.35);
  --glass-bg-light: rgba(80,140,200,0.25);
  --glass-bg-heavy: rgba(80,140,200,0.45);
  --glass-border: rgba(120,180,255,0.45);
  --glass-blur: 20px;
  --glass-radius: 18px;
  --glass-shadow: 0 4px 24px rgba(0,0,0,0.15);
  --text-primary: rgba(255,255,255,0.95);
  --text-secondary: rgba(255,255,255,0.85);
  --text-muted: rgba(255,255,255,0.6);
  --accent-color: rgba(102,126,234,0.9);
  --transition-fast: 0.15s;
  --transition-normal: 0.2s;
 }

 /* ===== 基础重置 ===== */
 * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
 body { 
  background:#b8d8e8; 
  overflow:hidden; 
  touch-action:none; 
  font-family:'PingFang SC','Segoe UI',sans-serif;
 }

/* ===== 场景视觉增强 ===== */
/* 水面波光动画 */
@keyframes waterShimmer {
  0%, 100% { filter: brightness(1.0) hue-rotate(0deg); }
  50% { filter: brightness(1.15) hue-rotate(5deg); }
}

/* 树木微风摇摆 */
@keyframes treeSway {
  0%, 100% { transform: rotate(0.5deg); }
  50% { transform: rotate(-0.5deg); }
}

/* 云层飘动 */
@keyframes cloudFloat {
  0% { transform: translateX(0); }
  50% { transform: translateX(10px); }
  100% { transform: translateX(0); }
}

/* 粒子闪烁 */
@keyframes particleTwinkle {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

/* 建筑窗户发光（夜间） */
@keyframes windowGlow {
  0%, 100% { filter: brightness(0.8); }
  50% { filter: brightness(1.2); }
}

/* 花朵轻摇 */
@keyframes flowerSway {
  0%, 100% { transform: rotate(1deg); }
  33% { transform: rotate(-1deg); }
  66% { transform: rotate(0.5deg); }
}

/* 草浪波动 */
@keyframes grassWave {
  0%, 100% { transform: scaleY(1.0) rotate(0deg); }
  50% { transform: scaleY(1.05) rotate(2deg); }
}

/* 星核碎片脉动 */
@keyframes shardPulse {
  0%, 100% { filter: brightness(1.0) drop-shadow(0 0 5px rgba(255,221,102,0.5)); }
  50% { filter: brightness(1.3) drop-shadow(0 0 15px rgba(255,221,102,0.9)); }
}

/* 石碑微光 */
@keyframes stoneGlow {
  0%, 100% { filter: brightness(1.0); }
  50% { filter: brightness(1.15); }
}

/* NPC 呼吸灯效果 */
@keyframes npcBreathe {
  0%, 100% { transform: scale(1.0); }
  50% { transform: scale(1.02); }
}

/* 风车叶片旋转（已存在，增强） */
@keyframes windmillSpin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

 /* ===== 玻璃效果工具类 保留毛玻璃效果 ===== */
 .glass {
  background: var(--glass-bg) !important;
  backdrop-filter: blur(12px) saturate(180%) !important;
  -webkit-backdrop-filter: blur(12px) saturate(180%) !important;
  border: 1px solid var(--glass-border) !important;
  box-shadow: var(--glass-shadow) !important;
  border-radius: var(--glass-radius);
 }
 
/* ===== 场景增强效果类 移除所有自动动画 ===== */
/* 老电脑友好：不启用自动动画 */
 .glass-light { 
  background: var(--glass-bg-light) !important;
  backdrop-filter: blur(8px) !important;
  -webkit-backdrop-filter: blur(8px) !important;
 }
 .glass-heavy { 
  background: var(--glass-bg-heavy) !important;
  backdrop-filter: blur(12px) !important;
  -webkit-backdrop-filter: blur(12px) !important;
 }

 /* ===== 加载屏幕 ===== */
 #loading-screen {
  position: fixed; inset: 0;
  background: #ffffff; z-index: 99999;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.5s ease;
 }
 #loading-text {
  font-size: 28px; color: #1a1a1a; font-weight: 200;
  letter-spacing: 4px; font-family: 'Helvetica Neue', Arial, sans-serif;
  min-width: 400px; text-align: center;
  animation: pulse 2s ease-in-out infinite;
 }
 @keyframes pulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
 }
 
 /* ===== 横屏提示 ===== */
 #landscape-hint {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.95); z-index: 100000;
  flex-direction: column; align-items: center; justify-content: center;
  color: #fff; text-align: center;
 }
 #landscape-hint.show { display: flex; }
 #landscape-hint svg { width: 80px; height: 80px; margin-bottom: 24px; fill: #fff; animation: rotateHint 3s ease-in-out infinite; }
 @keyframes rotateHint {
  0%, 100% { transform: rotate(-10deg); }
  50% { transform: rotate(10deg); }
 }
 #landscape-hint p { font-size: 20px; margin-bottom: 12px; font-weight: 300; }
 
 /* ===== 图标按钮 - 恢复毛玻璃效果 ===== */
 .icon-btn {
  width:44px; height:44px; border-radius:16px;
  background: rgba(255,255,255,0.08) !important;
  backdrop-filter: blur(12px) saturate(180%) !important;
  -webkit-backdrop-filter: blur(12px) saturate(180%) !important;
  border: 1px solid rgba(255,255,255,0.18) !important;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; color:var(--text-secondary);
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  transition: transform 0.15s ease, background 0.15s ease !important;
  cursor:pointer;
  pointer-events:auto !important;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  will-change: transform;
 }
 .icon-btn:active { background:rgba(255,255,255,0.18) !important; transform:scale(0.90); }
 .icon-btn:hover { transform:scale(1.05); background:rgba(255,255,255,0.12) !important; }
 .icon-btn[aria-label] { position: relative; }
 .text-btn { width:auto; padding:0 16px; font-size:15px; font-weight:bold; }
 
/* ===== 顶部栏 - 性能优化：移除入场动画 ===== */

 /* ===== 顶部栏 ===== */
 #top-bar { 
  position:absolute; top:16px; left:16px; right:16px; z-index:1000; 
  display:flex; justify-content:space-between; pointer-events:none; 
 }
 #top-left, #top-right { display:flex; gap:8px; pointer-events:auto; }

 /* ===== FPS 窗口 ===== */
 #fps-badge {
  position:absolute; bottom:16px; right:16px;
  background:rgba(255,255,255,0.08) !important;
  backdrop-filter: blur(8px) !important;
  -webkit-backdrop-filter: blur(8px) !important;
  padding:4px 12px; border-radius:14px;
  color:var(--text-muted); font-size:13px;
  border:1px solid rgba(255,255,255,0.15) !important;
  z-index:100;
 }

 /* ===== 任务面板 ===== */
 #quest-panel {
  position: absolute; top: 16px; left: 70px; z-index: 50;
  background: var(--glass-bg);
  padding: 8px; border-radius: 18px;
  border: 1px solid var(--glass-border);
  width: 200px; box-shadow: var(--glass-shadow);
  display: none; cursor: pointer;
 }
 #quest-panel:not(.hidden) { display: block; }
 .quest-item {
  padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
  font-size: 12px; color: var(--text-secondary); line-height: 1.5;
  transition: transform 0.15s ease;
 }
 .quest-item:hover { transform: translateX(4px); }
 .quest-item:last-child { border-bottom: none; }
 .quest-item.active { color: var(--text-primary); font-weight: 500; }
 .quest-item.completed { color: rgba(255,255,255,0.4); text-decoration: line-through; }
 .quest-icon { margin-right: 5px; }
 
 /* ===== 动态摇杆 - 性能优化：移除入场动画 ===== */
 #dynamic-joystick {
  position:absolute; width:130px; height:130px;
  background:rgba(255,255,255,0.06) !important;
  backdrop-filter: blur(8px) !important;
  -webkit-backdrop-filter: blur(8px) !important;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.15) !important;
  z-index:45; display:block; pointer-events:none; bottom:60px; left:20px;
 }
 #dynamic-thumb {
  position:absolute; width:56px; height:56px;
  background:rgba(255,255,255,0.25); border-radius:28px;
  left:37px; top:37px;
  box-shadow:0 0 16px rgba(255,255,255,0.3);
  border:1px solid rgba(255,255,255,0.35);
 }

 /* ===== 动作面板 移除入场动画 ===== */
 #action-panel { position:absolute; bottom:60px; right:20px; z-index:40; display:flex; flex-direction:row; gap:12px; pointer-events:auto; }
 .action-btn {
  width:68px; height:68px; border-radius:18px;
  background:rgba(255,255,255,0.08) !important;
  backdrop-filter: blur(12px) saturate(180%) !important;
  -webkit-backdrop-filter: blur(12px) saturate(180%) !important;
  border:1px solid rgba(255,255,255,0.15) !important;
  color:var(--text-secondary); font-size:30px;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 0 rgba(0,0,0,0.2);
  pointer-events:auto;
  transition: transform 0.06s ease, box-shadow 0.06s ease, background 0.15s ease !important;
  touch-action:manipulation;
  cursor:pointer;
  will-change: transform;
 }
 .action-btn:active { transform:translateY(4px) scale(0.95); box-shadow:none; background:rgba(255,255,255,0.18) !important; }
 .action-btn:hover { transform:scale(1.05); background:rgba(255,255,255,0.12) !important; }

 /* ===== 菜单面板 ===== */
 #menu-panel {
  position: absolute; top: 70px; left: 16px; width: 200px; z-index: 1000;
  background: var(--glass-bg);
  border-radius: var(--glass-radius); padding: 8px; border: 1px solid var(--glass-border);
  box-shadow: var(--glass-shadow);
  display: none !important;
  flex-direction: column; gap: 4px;
 }
 #menu-panel.show {
  display: flex !important;
  opacity: 1;
  transform: translateY(0) scale(1);
 }
 .menu-item {
  padding: 10px 14px; background: rgba(255,255,255,0.08);
  border-radius: 12px; color: var(--text-secondary); font-size: 14px; cursor: pointer;
  transition: transform 0.15s ease, background 0.15s ease !important;
  border: 1px solid rgba(255,255,255,0.1);
  will-change: transform;
 }
 .menu-item:active { background: rgba(255,255,255,0.16); transform: scale(0.96); }
 .menu-item:hover { transform: translateX(4px); background: rgba(255,255,255,0.12); }
 .menu-item:focus { outline: 2px solid var(--accent-color); outline-offset: 2px; }

 /* ===== 关于面板 ===== */
 #about-panel {
  position: absolute; top: 120px; left: 16px; width: 220px; z-index: 60;
  background: rgba(80,140,200,0.35);
  border-radius: 18px; padding: 16px; border: 1px solid rgba(120,180,255,0.45);
  display: none; flex-direction: column; gap: 10px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15); opacity: 0; transition: opacity 0.2s ease;
 }
 #about-panel.show { opacity: 1; }

 /* ===== 背包面板 ===== */
 #inventory-panel {
  position: absolute; top: 50%; left: 50%; transform:translate(-50%,-50%) scale(0.95);
  z-index: 300; width: 380px; max-width: 90vw; max-height: 80vh;
  background: var(--glass-bg);
  border-radius: var(--glass-radius); padding: 0; border: 1px solid var(--glass-border);
  display: none; flex-direction: column; gap: 0;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15); opacity: 0; transition: transform var(--transition-normal) ease, opacity var(--transition-normal) ease;
 }
 #inventory-panel.show { transform:translate(-50%,-50%) scale(1); opacity: 1; }
 .inventory-header {
  display: flex; justify-content: space-between; align-items: center;
  color: var(--text-primary); font-size: 16px; font-weight: 600;
  padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.06); border-radius: 18px 18px 0 0;
 }
 .inventory-close {
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; background: rgba(255,255,255,0.08); cursor: pointer;
  color: var(--text-secondary); transition: transform 0.15s ease, background 0.15s ease !important;
  will-change: transform;
 }
 .inventory-close:hover { background: rgba(255,255,255,0.16); color: var(--text-primary); transform: rotate(90deg); }
 .inventory-close:focus { outline: 2px solid var(--accent-color); outline-offset: 2px; }
 .inventory-content { padding: 14px 18px; max-height: 320px; overflow-y: auto; }
 .inventory-item {
  padding: 10px 14px; background: var(--glass-bg-light);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  border-radius: 12px; color: var(--text-secondary); font-size: 14px;
  border: 1px solid var(--glass-border); margin-bottom: 8px;
  transition: transform 0.15s ease;
 }
 .inventory-item:hover { transform: translateX(4px); }

 /* ===== 传送面板 ===== */
 #teleport-panel {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.95);
  z-index:300; background:var(--glass-bg) !important;
  backdrop-filter: blur(var(--glass-blur)) !important;
  -webkit-backdrop-filter: blur(var(--glass-blur)) !important;
  border-radius:22px; padding:0;
  border:1px solid var(--glass-border) !important;
  display:none; flex-direction:column; gap:0;
  width:420px; max-width:90vw; max-height:80vh;
  opacity:0; transition:transform 0.2s ease, opacity 0.2s ease;
  box-shadow:var(--glass-shadow);
 }
 #teleport-panel.show { transform:translate(-50%,-50%) scale(1); opacity:1; }
 .tp-header {
  display:flex; justify-content:space-between; align-items:center;
  color:rgba(255,255,255,0.9); font-size:16px; font-weight:600;
  padding:14px 18px; border-bottom:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.06); border-radius:22px 22px 0 0;
 }
 .tp-close {
  width:32px; height:32px; display:flex; align-items:center; justify-content:center;
  border-radius:50%; background:rgba(255,255,255,0.08); cursor:pointer;
  color:rgba(255,255,255,0.7); transition:transform 0.15s ease, background 0.15s ease !important;
  will-change: transform;
 }
 .tp-close:hover { background:rgba(255,255,255,0.16); color:rgba(255,255,255,0.9); transform: rotate(90deg); }
 .tp-content { padding:16px 24px; max-height:320px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }
 .tp-item {
  padding:14px 18px; background:var(--glass-bg-light);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  border-radius:14px; color:rgba(255,255,255,0.85); font-size:15px; cursor:pointer;
  border:1px solid var(--glass-border);
  display:flex; justify-content:space-between; align-items:center;
  transition: transform 0.15s ease, background 0.15s ease !important;
  will-change: transform;
 }
 .tp-item:active { background:var(--glass-bg); transform: scale(0.98); }
 .tp-item:hover { background:var(--glass-bg); transform: translateX(4px); }
 .tp-item .tp-arrow { color:rgba(255,255,255,0.5); font-size:18px; }
 .tp-item.locked { opacity:0.4; pointer-events:none; }
 .tp-item .tp-lock { font-size:14px; }

 /* ===== 设置面板 ===== */
 #settings-panel {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.95);
  z-index:300; background:rgba(80,140,200,0.35) !important;
  border-radius:18px; padding:0;
  border:1px solid rgba(120,180,255,0.45) !important;
  display:none; flex-direction:column; gap:0;
  width:380px; max-width:90vw; max-height:80vh;
  opacity:0; transition:transform 0.2s ease, opacity 0.2s ease;
  box-shadow:0 8px 32px rgba(0,0,0,0.15);
 }
 #settings-panel.show { transform:translate(-50%,-50%) scale(1); opacity:1; }
 .settings-header {
  display:flex; justify-content:space-between; align-items:center;
  color:rgba(255,255,255,0.9); font-size:16px; font-weight:600;
  padding:14px 18px; border-bottom:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.06); border-radius:18px 18px 0 0;
 }
 .settings-close {
  width:32px; height:32px; display:flex; align-items:center; justify-content:center;
  border-radius:50%; background:rgba(255,255,255,0.08); cursor:pointer;
  color:rgba(255,255,255,0.7); transition:transform 0.15s ease, background 0.15s ease !important;
  will-change: transform;
 }
 .settings-close:hover { background:rgba(255,255,255,0.16); color:rgba(255,255,255,0.9); transform: rotate(90deg); }
 .settings-content { padding:14px 18px; max-height:320px; overflow-y:auto; }
 .setting-row { 
  display:flex; justify-content:space-between; align-items:center; 
  color:rgba(255,255,255,0.85); font-size:13px; padding:10px 0; 
  border-bottom:1px solid rgba(255,255,255,0.05);
 }
 .setting-row:last-child { border-bottom:none; }
 .setting-row span:first-child { color:rgba(255,255,255,0.85); }
 .setting-row input[type="range"] { width:120px; accent-color:rgba(120,180,255,0.8); }
 .setting-row select { 
  background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.85); 
  border:1px solid rgba(255,255,255,0.15);
  padding:6px 12px; border-radius:10px; font-size:12px; min-width:90px; cursor:pointer; 
 }
 .setting-row select:hover { background:rgba(255,255,255,0.12); }
 .setting-row input[type="range"] { width: 120px; accent-color: #667eea; }

  /* ===== 对话框 ===== */
 #dialog-panel {
  position:absolute; bottom:40px; left:50%; transform:translateX(-50%) translateY(20px); z-index:200;
  background:var(--glass-bg);
  padding:18px 32px; border-radius:28px;
  display:none; flex-direction:column; gap:6px;
  border:1px solid var(--glass-border);
  min-width:300px; max-width:500px;
  opacity:0; transition:transform var(--transition-normal) ease, opacity var(--transition-normal) ease;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
 }
 #dialog-panel.show { transform:translateX(-50%) translateY(0); opacity:1; }
 #dialog-panel[role="dialog"] { border: 2px solid var(--accent-color); }
 #dialog-name { color:var(--text-primary); font-weight:bold; font-size:16px; }
 #dialog-text { color:var(--text-secondary); font-size:18px; line-height:1.5; }

 #dialog-controls { position:absolute; top:100px; right:16px; z-index:210; display:none; gap:12px; }
 .dialog-btn {
  padding:10px 20px; background:var(--glass-bg-light) !important;
  backdrop-filter: blur(8px) !important;
  -webkit-backdrop-filter: blur(8px) !important;
  border-radius:28px;
  color:var(--text-secondary); font-size:16px; font-weight:bold;
  border:1px solid var(--glass-border) !important; cursor:pointer;
  transition: transform 0.15s ease, background 0.15s ease !important;
 }
 .dialog-btn:active { transform: scale(0.95); }
 .dialog-btn:focus { outline: 2px solid var(--accent-color); outline-offset: 2px; }

 /* ===== 阅读面板 ===== */
 #read-panel {
  position:absolute; bottom:100px; left:50%; transform:translateX(-50%); z-index:250;
  background:var(--glass-bg);
  padding:20px 30px; border-radius:24px;
  display:none; flex-direction:column; gap:12px;
  border:1px solid var(--glass-border);
  max-width:400px; box-shadow:0 8px 32px rgba(0,0,0,0.15);
 }
 #read-title { color:rgba(255,230,180,0.95); font-size:18px; font-weight:bold; }
 #read-content { color:var(--text-secondary); font-size:15px; line-height:1.6; max-height:200px; overflow-y:auto; white-space:pre-wrap; }
 #read-close {
  align-self:flex-end; color:var(--text-secondary); font-size:16px; cursor:pointer;
  padding:6px 18px; background:var(--glass-bg-light);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius:18px; border:1px solid var(--glass-border);
  transition: transform 0.15s ease, background 0.15s ease !important;
 }
 #read-close:active { transform: scale(0.95); }
 #read-close:focus { outline: 2px solid var(--accent-color); outline-offset: 2px; }

 /* ===== 跳过确认 ===== */
 #skip-confirm {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:400;
  background:var(--glass-bg) !important;
  backdrop-filter: blur(var(--glass-blur)) !important;

 }

  padding:12px 28px; border-radius:28px; font-size:16px; font-weight:bold; cursor:pointer;

 }

 /* ===== 故事确认容器 ===== */

<script type="module">
/** */

import * as THREE from 'three';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ===================================================================
// 游戏主模块 - 封装全局变量
// ===================================================================
const Game = (function() {
 // 预分配临时变量（性能优化）
 const _v3_temp1 = new THREE.Vector3();
 const _v3_temp2 = new THREE.Vector3();

 // 配置常量 - 骁龙 114514 优化版 + 远处显示增强
 const CONFIG = {
  RENDER: { viewDistance:50, shadowDistance:30, fogDensity:0.0015, pixelRatio:Math.min(0.75,devicePixelRatio), cullInterval:16 }, // 视距从 40 提升到 50
  PLAYER: { speed:0.26, runSpeed:0.45, height:1.5, radius:1.2, jumpForce:0.42, gravity:0.018 },
  CAMERA: { distance:8.0, height:1.8, sensitivity:0.018, pitchMin:-0.5, pitchMax:1.5, dialogDistance:5.5, dialogHeight:2.5 },
  UI: { opacity:10, joystickSize:130, joystickAlpha:40, fadeOutDelay:3000, joystickRadius:65, labelHideDist:12 }, // 标签显示距离从 10 提升到 12
  PERFORMANCE: { maxCollisionIter:3, fpsSampleWindow:500, gridSize:25, proximityCheckInterval:800 }
 };

 // 事件总线
 class EventBus {
  constructor(){this.listeners=new Map();}
  on(e,cb){if(!this.listeners.has(e))this.listeners.set(e,[]);this.listeners.get(e).push(cb);return()=>this.off(e,cb);}
  off(e,cb){const c=this.listeners.get(e);if(c)this.listeners.set(e,c.filter(x=>x!==cb));}
  emit(e,d){const c=this.listeners.get(e);if(c)c.forEach(x=>x(d));}
 }
 const gameEvents = new EventBus();

 // 游戏状态
 class GameState {
  constructor(){
   this.state={phase:'playing',cycleCount:1,player:{position:{x:0,y:CONFIG.PLAYER.height,z:0},rotation:0,isRunning:false,isAttacking:false,canJump:true,yVelocity:0,shards:0,inventory:[],stonesRead:[],regionsVisited:new Set(),secondWeekUnlocked:false},npcs:{cat:{storyPhase:0,storyCompleted:false,waiting:false,laterCount:0,affinity:0},elder:{storyCompleted:false,waiting:false,laterCount:0,affinity:0}},ui:{menuOpen:false,settingsOpen:false,inventoryOpen:false,aboutOpen:false,dialogActive:false,readPanelOpen:false,diaryOpen:false,teleportOpen:false},settings:{sensitivity:CONFIG.CAMERA.sensitivity,uiOpacity:CONFIG.UI.opacity,weather:'clear',timeOfDay:12,autoTimeFlow:false,quality:2,fpsLimit:60,shadowEnabled:true,viewDistance:CONFIG.RENDER.viewDistance},quests:{shardsCollected:0,shardsTotal:7},endings:{decisions:[],endingTriggered:false}};
  }
  get(p){return p.split('.').reduce((o,k)=>o&&o[k],this.state);}
  set(p,v){const k=p.split('.');const l=k.pop();const t=k.reduce((o,x)=>o&&o[x],this.state);if(t){t[l]=v;gameEvents.emit('state:change',{path:p,value:v});}}
  update(u){Object.entries(u).forEach(([p,v])=>this.set(p,v));}
  exportSave(){const s=JSON.parse(JSON.stringify(this.state));s.player.regionsVisited=[...this.state.player.regionsVisited];return s;}
  importSave(d){this.state={...this.state,...d};this.state.player.regionsVisited=new Set(d.player.regionsVisited||[]);}
 }
 const gameState = new GameState();

 // 存档系统
 class SaveSystem {
  static SAVE_KEY='starfall_save_v3';static SETTINGS_KEY='starfall_settings_v3';static AUTO_SAVE_INTERVAL=60000;
  static save(){try{localStorage.setItem(this.SAVE_KEY,JSON.stringify({version:'3.1',timestamp:Date.now(),state:gameState.exportSave()}));gameEvents.emit('save:complete');}catch(e){console.warn('[Save] Failed:',e);}}
  static load(){try{const d=localStorage.getItem(this.SAVE_KEY);if(d){const s=JSON.parse(d);gameState.importSave(s.state);gameEvents.emit('load:complete');return true;}}catch(e){console.warn('[Load] Failed:',e);}return false;}
  static saveSettings(){try{localStorage.setItem(this.SETTINGS_KEY,JSON.stringify(gameState.get('settings')));}catch(e){}}
  static loadSettings(){try{const d=localStorage.getItem(this.SETTINGS_KEY);if(d){const s=JSON.parse(d);gameState.update(Object.entries(s).reduce((a,[k,v])=>{a[`settings.${k}`]=v;return a;},{}));}}catch(e){}}
  static hasSave(){return!!localStorage.getItem(this.SAVE_KEY);}
  static startAutoSave(){this.timer=setInterval(()=>{if(gameState.get('phase')==='playing')this.save();},this.AUTO_SAVE_INTERVAL);}
  static stopAutoSave(){if(this.timer)clearInterval(this.timer);}
 }

 // UI 管理器
 class UIManager {
  constructor(){this.panels=new Map();this._registerPanels();}
  _registerPanels(){['menu','settings','inventory','about','dialog','read','diary','teleport'].forEach(id=>{const el=document.getElementById(id==='dialog'?'dialog-panel':id==='read'?'read-panel':id==='teleport'?'teleport-panel':`${id}-panel`);if(el)this.panels.set(id,{element:el,visible:false});});}
  show(id){const p=this.panels.get(id);if(!p)return;if(id==='settings'||id==='teleport')this.hideAll();p.visible=true;p.element.style.display='flex';setTimeout(()=>p.element.classList.add('show'),10);gameState.set(`ui.${id}Open`,true);this._updateAria(id,true);}
  hide(id){const p=this.panels.get(id);if(!p)return;p.visible=false;p.element.classList.remove('show');setTimeout(()=>{p.element.style.display='none';},200);gameState.set(`ui.${id}Open`,false);this._updateAria(id,false);}

function createTerrain(size, segments, roughness) {
 const geo = new THREE.PlaneGeometry(size, size, segments, segments);
 geo.rotateX(-Math.PI/2);
 const pos = geo.attributes.position;
 const colors = new Float32Array(pos.count * 3);
 
 for(let i = 0; i < pos.count; i++){
  const x = pos.getX(i), z = pos.getZ(i);
  let h = 0;
  
  h += Math.sin(x*0.015)*Math.cos(z*0.015)*8;
  h += Math.sin(x*0.04+0.8)*Math.cos(z*0.03+1.2)*5;
  h += Math.sin(x*0.08+2.1)*Math.cos(z*0.06+0.5)*2.5;
  
  const riverCenter = Math.sin(x*0.03)*30;
  const riverDist = Math.abs(z - riverCenter);
  if(riverDist < 10) {
   const smoothT = riverDist / 10;
   const smoothCurve = smoothT * smoothT * (3 - 2 * smoothT);
   h -= 3.0 * (1 - smoothCurve);
  }
  
  const distFromCenter = Math.sqrt(x*x + z*z);
  if(distFromCenter < 15) h *= distFromCenter/15;
  
  pos.setY(i, h*roughness);
  
  const actualY = h * roughness;
  let r, g, b;
  
  if (actualY < -0.5) { r = 0.50; g = 0.35; b = 0.25; } // 河床深褐色
  else if (actualY < 1) {
   const t = (actualY + 0.5) / 1.5;
   const noise = Math.sin(x*0.04) * Math.cos(z*0.04) * 0.25 + 0.75;
   r = 0.45 + noise * 0.10; g = 0.50 + noise * 0.15; b = 0.25 + noise * 0.08; // 浅草绿
  } else if (actualY < 6) {
   const noise = Math.sin(x*0.03) * Math.cos(z*0.03) * 0.3 + 0.7;
   r = 0.40 - noise * 0.08; g = 0.55 + noise * 0.12; b = 0.25 + noise * 0.06; // 中草绿
  } else if (actualY < 12) {
   const noise = Math.sin(x*0.025 + 0.5) * Math.cos(z*0.025 - 0.3) * 0.35 + 0.65;
   r = 0.35 + noise * 0.08; g = 0.60 + noise * 0.10; b = 0.28 + noise * 0.05; // 深草绿
  } else {
   const noise = Math.sin(x*0.02) * Math.cos(z*0.02) * 0.4 + 0.6;
   r = 0.30 + noise * 0.08; g = 0.50 + noise * 0.12; b = 0.25 + noise * 0.05; // 高山深绿
  }
  
  colors[i*3] = r; colors[i*3+1] = g; colors[i*3+2] = b;
 }
 
 geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
 geo.computeVertexNormals();
 return geo;
}

 return new THREE.MeshStandardMaterial({
  vertexColors: true, roughness: 0.7, metalness: 0.0, flatShading: false
 });
}

 // 随机选择 1-3 个面来放置灌木丛
 const sides = Math.floor(1 + Math.random() * 3); // 1-3 个面
 const availableSides = ['north', 'south', 'east', 'west'];

  const idx = Math.floor(Math.random() * availableSides.length);
  selectedSides.push(availableSides.splice(idx, 1)[0]);
 }

 selectedSides.forEach(side => {

   // 北侧：z = house.z + houseSize + bushDistance

    const offsetZ = (Math.random() - 0.5) * 2;
    const x = house.x + houseSize + bushDistance + (Math.random() - 0.5) * 2;

     bushData.push({ x, y: getTerrainHeight(x, z + offsetZ) + 0.8, z: z + offsetZ, scale: 0.8 + Math.random() * 0.4 });

   }
  }
 });
});

// 草地顶点 Shader
const grassVertexShader = `
varying vec2 vUv;
varying vec3 vPosition;
uniform float time;
uniform vec3 cameraPos;
uniform vec3 playerPos;

void main() {
 vUv = uv;
 vPosition = position;
 
 // 基础位置
 vec3 pos = position;
 
 // 风力摆动（正弦波）
 float wind = sin(time * 2.0 + position.y * 3.0) * 0.05;
 pos.x += wind * position.y;
 pos.z += cos(time * 1.5 + position.y * 2.0) * 0.05;
 
 // 玩家压倒效果（圆形范围）
 float distToPlayer = distance(pos.xz, playerPos.xz);
 float squashRadius = 3.0;
 float squashStrength = 0.8;
 if(distToPlayer < squashRadius) {
  float squash = 1.0 - smoothstep(0.0, squashRadius, distToPlayer);
  pos.x += (pos.x - playerPos.x) * squash * squashStrength;
  pos.z += (pos.z - playerPos.z) * squash * squashStrength;
  pos.y *= (1.0 - squash * 0.6); // 压低
 }
 
 vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
 gl_Position = projectionMatrix * mvPosition;
}
`;

// 草地片段 Shader
const grassFragmentShader = `
varying vec2 vUv;
varying vec3 vPosition;
uniform vec3 grassColor;
uniform float opacity;

void main() {
 // 上尖下宽：使用三角形渐变
 float alpha = smoothstep(0.0, 0.1, vUv.y) * (1.0 - smoothstep(0.85, 1.0, vUv.y));
 
 // 颜色渐变（底部深，顶部浅）
 vec3 color = grassColor * (0.7 + vUv.y * 0.3);
 
 gl_FragColor = vec4(color, alpha * opacity);
}
`;

const bushSources = [

 { x: 65, z: 45 }, { x: 70, z: 60 }, { x: 82, z: 42 },

// v33 LOD 优化 - 按照树的视锥裁剪方式
const superClusterCount = 2500; // 保持数量不变

for(let s = 0; s < superClusterCount; s++) {
 const scx = (Math.random() - 0.5) * grassArea;
 const scz = (Math.random() - 0.5) * grassArea;
 
 if(!isOnWater(scx, scz)) {
  const scy = getTerrainHeight(scx, scz);
  
  // 超级簇内 2-4 个普通簇
  const normalClusters = 2 + Math.floor(Math.random() * 3);
  
  for(let c = 0; c < normalClusters; c++) {
   // 普通簇在超级簇内偏移（5-15 单位）
   const offsetAngle = Math.random() * Math.PI * 2;
   const offsetDist = 5 + Math.random() * 10;
   const cx = scx + Math.cos(offsetAngle) * offsetDist;
   const cz = scz + Math.sin(offsetAngle) * offsetDist;
   
   if(!isOnWater(cx, cz)) {
    const cy = getTerrainHeight(cx, cz);
    
    // 根据高度决定草密度
    let grassDensity = 0;
    let heightRange = [0, 0];
    
    if(cy >= 1 && cy <= 8) {
     // 纯绿色：每簇 3-5 根
     grassDensity = 3 + Math.floor(Math.random() * 3);
     heightRange = [0.35, 0.65];
    } else if(cy >= -0.5 && cy < 1) {
     // 黄绿色：稀疏 40%
     if(Math.random() > 0.6) continue;
     grassDensity = 2 + Math.floor(Math.random() * 2);
     heightRange = [0.25, 0.5];
    } else if(cy > 8 && cy <= 11) {
     // 高山黄/棕：很稀疏 20%
     if(Math.random() > 0.8) continue;
     grassDensity = 1 + Math.floor(Math.random() * 2);
     heightRange = [0.2, 0.4];
    } else {
     continue;
    }
    
    // 灌木丛效应
    let minBushDist = Infinity;
    bushSources.forEach(b => {
     const d = Math.sqrt((cx-b.x)**2 + (cz-b.z)**2);
     if(d < minBushDist) minBushDist = d;
    });
    const bushEffect = Math.max(0, 1.0 - minBushDist / 30);
    
    for(let i = 0; i < grassDensity; i++) {
     const angle = Math.random() * Math.PI * 2;
     const radius = 0.25 + Math.random() * 0.35;
     const gx = cx + Math.cos(angle) * radius;
     const gz = cz + Math.sin(angle) * radius;
     const gy = getTerrainHeight(gx, gz);
     
     const baseHeight = heightRange[0] + Math.random() * (heightRange[1] - heightRange[0]);
     const bushBonus = bushEffect * 0.2 * Math.random();
     const height = baseHeight + bushBonus;
     
     grassClusters.push({ x: gx, y: gy, z: gz, h: height, r: Math.random() * Math.PI * 2 });
    }
   }
  }
 }
}

// ===================================================================
// 碰撞检测
// ===================================================================
function resolveCollision(newPos, radius) {
 // 如果碰撞检测已关闭，直接返回原始位置
 if(!collisionEnabled) return newPos;
 
 // 稳定性：验证输入位置
 if(!isFinite(newPos.x) || !isFinite(newPos.z)) return new THREE.Vector3(0, newPos.y, 0);
 
 const key = getGridKey(newPos.x, newPos.z);
 const keys = [key];
 const [cx, cz] = key.split(',').map(Number);
 if(!isFinite(cx) || !isFinite(cz)) return newPos;
 
 for(let dx = -1; dx <= 1; dx++)
  for(let dz = -1; dz <= 1; dz++)
   keys.push(`${cx+dx},${cz+dz}`);
 
 let resolved = newPos.clone();
 const MAX_ITER = CONFIG.PERFORMANCE.maxCollisionIter;
 let iter = 0;
 
 for(let k of keys) {
  if(iter >= MAX_ITER) break;
  const cell = grid.get(k);
  if(!cell) continue;
  for(let o of cell) {
   if(iter >= MAX_ITER) break;
   const dx = resolved.x - o.pos.x, dz = resolved.z - o.pos.z;
   const distSq = dx*dx + dz*dz;
   const minDist = radius + o.radius;
   if(distSq < minDist*minDist && distSq > 0.0001) {
    const dist = Math.sqrt(distSq);
    const angle = Math.atan2(dz, dx);
    const pushX = Math.cos(angle) * (minDist - dist);
    const pushZ = Math.sin(angle) * (minDist - dist);
    // 稳定性：防止推送量过大导致传送
    if(isFinite(pushX) && Math.abs(pushX) < 50) resolved.x += pushX;
    if(isFinite(pushZ) && Math.abs(pushZ) < 50) resolved.z += pushZ;
    iter++;
   }
  }
 }
 
 // 稳定性：最终验证
 if(!isFinite(resolved.x)) resolved.x = newPos.x;
 if(!isFinite(resolved.z)) resolved.z = newPos.z;
 // 防止超出地图边界
 resolved.x = Math.max(-250, Math.min(250, resolved.x));
 resolved.z = Math.max(-250, Math.min(250, resolved.z));
 return resolved;
}

function hitFeedback(target) {
 if(target.material && target.material.color) {
  const orig = target.material.color.getHex();
  target.material.color.setHex(0xffffff);
  setTimeout(() => {
   try { target.material.color.setHex(orig); } catch(e) {}
  }, 50);
 }
}

// 虚拟摇杆
const dynJoy = document.getElementById('dynamic-joystick'), dynThumb = document.getElementById('dynamic-thumb');
const pointerRoles = new Map();
let joyVec = new THREE.Vector2(0, 0), joyStartX = 0, joyStartY = 0, joyActive = false, yaw = 0, pitch = 0.5;
const pointerLastPos = new Map();
let sensitivity = CONFIG.CAMERA.sensitivity;

renderer.domElement.addEventListener('pointerdown', e => {
 if(gameState.get('ui.menuOpen') || gameState.get('ui.settingsOpen') || gameState.get('ui.inventoryOpen') || gameState.get('ui.aboutOpen')) return;
 if(e.target !== renderer.domElement) return;
 
 let role = null;
 if(e.clientX < innerWidth/2) {
  let h = false;
  for(let r of pointerRoles.values()) if(r === 'joy') h = true;
  if(!h && !joyActive) role = 'joy';
 }
 if(role === null) role = 'view';
 pointerRoles.set(e.pointerId, role);
 pointerLastPos.set(e.pointerId, { x: e.clientX, y: e.clientY });
 
 if(role === 'joy') {
  e.preventDefault();
  joyActive = true;
  joyStartX = e.clientX;
  joyStartY = e.clientY;
  dynJoy.style.display = 'block';
  const joyR = CONFIG.UI.joystickRadius;
  const maxX = innerWidth - joyR*2, maxY = innerHeight - joyR*2;
  dynJoy.style.left = Math.max(0, Math.min(joyStartX - joyR, maxX)) + 'px';
  dynJoy.style.top = Math.max(0, Math.min(joyStartY - joyR, maxY)) + 'px';
  dynThumb.style.left = (joyR - 28) + 'px';
  dynThumb.style.top = (joyR - 28) + 'px';
  joyVec.set(0, 0);
 }
});

renderer.domElement.addEventListener('pointermove', e => {
 if(gameState.get('ui.menuOpen') || gameState.get('ui.settingsOpen') || gameState.get('ui.inventoryOpen') || gameState.get('ui.aboutOpen')) return;
 if(e.target !== renderer.domElement) return;
 
 const role = pointerRoles.get(e.pointerId), last = pointerLastPos.get(e.pointerId);
 if(!last) return;
 
 if(role === 'joy') {
  e.preventDefault();
  const dx = e.clientX - joyStartX, dy = e.clientY - joyStartY;
  const max = 45, dist = Math.sqrt(dx*dx + dy*dy);
  let cx = dx, cy = dy;
  if(dist > max) { cx = dx*max/dist; cy = dy*max/dist; }
  joyVec.set(cx/max, -cy/max);
  dynThumb.style.left = (37 + cx) + 'px';
  dynThumb.style.top = (37 + cy) + 'px';
 } else if(role === 'view') {
  if(!isDialogActive) {
   const dx = e.clientX - last.x, dy = e.clientY - last.y;
   if(Math.abs(dx) > 3 || Math.abs(dy) > 3) {
    yaw -= dx * sensitivity;
    pitch = Math.max(CONFIG.CAMERA.pitchMin, Math.min(CONFIG.CAMERA.pitchMax, pitch + dy * sensitivity));
   }
  }
 }
 pointerLastPos.set(e.pointerId, { x: e.clientX, y: e.clientY });
});

renderer.domElement.addEventListener('pointerup', e => {
 if(gameState.get('ui.menuOpen') || gameState.get('ui.settingsOpen') || gameState.get('ui.inventoryOpen') || gameState.get('ui.aboutOpen')) return;
 if(e.target !== renderer.domElement) return;
 
 const role = pointerRoles.get(e.pointerId);
 if(role === 'joy') {
  e.preventDefault();
  joyActive = false;
  dynJoy.style.display = 'none';
  joyVec.set(0, 0);
 }
 pointerRoles.delete(e.pointerId);
 pointerLastPos.delete(e.pointerId);
});

function takeScreenshot() {
 try {
  renderer.render(scene, camera);
  const canvas = renderer.domElement;
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = canvas.width;
  tempCanvas.height = canvas.height;
  const tempCtx = tempCanvas.getContext('2d');
  tempCtx.drawImage(canvas, 0, 0);
  const wmText = 'StarFall';
  tempCtx.save();
  tempCtx.font = '100 48px "Raleway", "Exo 2", sans-serif';
  tempCtx.fillStyle = 'rgba(255, 255, 255, 0.95)';
  tempCtx.letterSpacing = '12px';
  tempCtx.shadowColor = 'rgba(0, 0, 0, 0.3)';
  tempCtx.shadowBlur = 8;
  tempCtx.shadowOffsetY = 2;
  tempCtx.textBaseline = 'bottom';
  const textMetrics = tempCtx.measureText(wmText);
  const textWidth = textMetrics.width + 12 * (wmText.length - 1);
  const margin = 40;
  const x = tempCanvas.width - textWidth - margin;
  const y = tempCanvas.height - margin;
  tempCtx.fillText(wmText, x, y);
  tempCtx.restore();
  const dataURL = tempCanvas.toDataURL('image/png');
  const link = document.createElement('a');
  const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, -5);
  link.download = `星落截图_${timestamp}.png`;
  link.href = dataURL;
  link.click();
  uiManager.showNotification('截图已保存');
 } catch(err) {
  console.error('[Screenshot] Failed:', err);
  uiManager.showNotification('截图失败，请重试');
 }
}

 endingTriggered = true;
 gameState.set('endings.endingTriggered', true);
 
 const catAffinity = gameState.get('npcs.cat.affinity');

}

// 预计算颜色对象，减少每帧创建
const _skyColor = new THREE.Color();
const _fogColor = new THREE.Color();
const _sunColor = new THREE.Color();
const _hemiSky = new THREE.Color();
const _hemiGround = new THREE.Color();
const _ambientColor = new THREE.Color();

function animate() {
 if(!running) return;
 frameId = requestAnimationFrame(animate);
 
 try {
  const now = performance.now();
  const delta = Math.min(0.03, (now - last) / 1000);
  last = now;
  if(!isFinite(delta) || delta <= 0) return;

  // 自动时间
  if(gameState.get('settings.autoTimeFlow')) {
   timeOfDay += delta * 0.3;
   if(timeOfDay >= 24) timeOfDay = 0;
   const timeSlider = document.getElementById('timeSlider');
   const timeValue = document.getElementById('timeValue');
   if(timeSlider) timeSlider.value = timeOfDay;
   if(timeValue) timeValue.textContent = `${Math.floor(timeOfDay)}:${Math.floor((timeOfDay%1)*60).toString().padStart(2,'0')}`;
  }
  
  const hour = timeOfDay;
  const isNight = (hour < 6 || hour >= 18);
  
  // 基于时间计算天空和光照颜色 - 使用预分配对象
  let sunIntensity;
  
  if(hour >= 5 && hour < 7) {
   const t = (hour - 5) / 2;
   _skyColor.setRGB(0.1, 0.1, 0.16).lerp(new THREE.Color(1, 0.67, 0.4), t);
   _fogColor.setRGB(0.16, 0.16, 0.23).lerp(new THREE.Color(1, 0.86, 0.8), t);
   sunIntensity = t * 0.3;
   _sunColor.setRGB(1, 0.33, 0.13).lerp(new THREE.Color(1, 0.93, 0.67), t);
   _hemiSky.setRGB(0.16, 0.16, 0.29).lerp(new THREE.Color(0.67, 0.8, 1), t);
   _hemiGround.setRGB(0.1, 0.16, 0.1).lerp(new THREE.Color(0.47, 0.6, 0.33), t);
   _ambientColor.setRGB(0.13, 0.2, 0.27).lerp(new THREE.Color(0.6, 0.67, 0.73), t);
  } else if(hour >= 7 && hour < 9) {
   const t = (hour - 7) / 2;
   _skyColor.setRGB(1, 0.67, 0.4).lerp(new THREE.Color(0.75, 0.85, 0.94), t);
   _fogColor.setRGB(1, 0.86, 0.8).lerp(new THREE.Color(0.85, 0.91, 0.94), t);
   sunIntensity = 0.3 + t * 0.2;
   _sunColor.setRGB(1, 0.93, 0.67).lerp(new THREE.Color(1, 0.94, 0.87), t);
   _hemiSky.setRGB(0.67, 0.8, 1).lerp(new THREE.Color(0.69, 0.82, 0.94), t);
   _hemiGround.setRGB(0.47, 0.6, 0.33).lerp(new THREE.Color(0.53, 0.67, 0.4), t);
   _ambientColor.setRGB(0.6, 0.67, 0.73).lerp(new THREE.Color(0.67, 0.73, 0.8), t);
  } else if(hour >= 9 && hour < 16) {
   _skyColor.setRGB(0.36, 0.64, 0.82);
   _fogColor.setRGB(0.66, 0.85, 0.91);
   sunIntensity = 0.65;
   _sunColor.setRGB(1, 0.97, 0.86);
   _hemiSky.setRGB(0.53, 0.8, 0.92);
   _hemiGround.setRGB(0.42, 0.56, 0.14);
   _ambientColor.setRGB(0.94, 0.97, 1);
  } else if(hour >= 16 && hour < 18) {
   const t = (hour - 16) / 2;
   _skyColor.setRGB(0.36, 0.64, 0.82).lerp(new THREE.Color(0.53, 0.8, 0.92), t);
   _fogColor.setRGB(0.66, 0.85, 0.91).lerp(new THREE.Color(0.69, 0.85, 0.94), t);
   sunIntensity = 0.65 - t * 0.15;
   _sunColor.setRGB(1, 0.97, 0.86).lerp(new THREE.Color(1, 0.93, 0.73), t);
   _hemiSky.setRGB(0.53, 0.8, 0.92).lerp(new THREE.Color(0.69, 0.82, 0.94), t);
   _hemiGround.setRGB(0.42, 0.56, 0.14).lerp(new THREE.Color(0.53, 0.67, 0.4), t);
   _ambientColor.setRGB(0.94, 0.97, 1).lerp(new THREE.Color(0.91, 0.94, 0.97), t);
  } else if(hour >= 18 && hour < 20) {
   const t = (hour - 18) / 2;
   _skyColor.setRGB(0.85, 0.78, 0.91).lerp(new THREE.Color(1, 0.53, 0.33), t);
   _fogColor.setRGB(0.91, 0.85, 0.94).lerp(new THREE.Color(1, 0.8, 0.67), t);
   sunIntensity = 0.3 - t * 0.15;
   _sunColor.setRGB(1, 0.93, 0.73).lerp(new THREE.Color(1, 0.4, 0.2), t);
   _hemiSky.setRGB(0.78, 0.72, 0.85).lerp(new THREE.Color(0.87, 0.67, 0.8), t);
   _hemiGround.setRGB(0.6, 0.53, 0.47).lerp(new THREE.Color(0.4, 0.33, 0.27), t);
   _ambientColor.setRGB(0.73, 0.67, 0.8).lerp(new THREE.Color(0.53, 0.47, 0.4), t);
  } else if(hour >= 20 && hour < 22) {
   const t = (hour - 20) / 2;
   _skyColor.setRGB(1, 0.53, 0.33).lerp(new THREE.Color(0.16, 0.16, 0.29), t);
   _fogColor.setRGB(1, 0.8, 0.67).lerp(new THREE.Color(0.23, 0.23, 0.35), t);
   sunIntensity = 0.15 - t * 0.1;
   _sunColor.setRGB(1, 0.4, 0.2).lerp(new THREE.Color(0.27, 0.33, 0.4), t);
   _hemiSky.setRGB(0.87, 0.67, 0.8).lerp(new THREE.Color(0.23, 0.23, 0.35), t);
   _hemiGround.setRGB(0.4, 0.33, 0.27).lerp(new THREE.Color(0.16, 0.23, 0.16), t);
   _ambientColor.setRGB(0.53, 0.47, 0.4).lerp(new THREE.Color(0.27, 0.33, 0.4), t);
  } else {
   _skyColor.setRGB(0.1, 0.1, 0.23);
   _fogColor.setRGB(0.16, 0.16, 0.29);
   sunIntensity = 0.15;
   _sunColor.setRGB(0.2, 0.27, 0.4);
   _hemiSky.setRGB(0.16, 0.16, 0.29);
   _hemiGround.setRGB(0.1, 0.16, 0.1);
   _ambientColor.setRGB(0.2, 0.27, 0.33);
  }
  
  scene.background.copy(_skyColor);
  scene.fog.color.copy(_fogColor);
  sun.intensity = sunIntensity;
  sun.color.copy(_sunColor);
  
  // 优化光照更新：只遍历一次
  scene.children.forEach(c => {
   if(c.isHemisphereLight) {
    c.color.copy(_hemiSky);
    c.groundColor.copy(_hemiGround);
   } else if(c.isAmbientLight) {
    c.color.copy(_ambientColor);
   }
  });

  // HUD 淡出
  const questEl = document.getElementById('quest-tracker');
  if(joyVec.length() < 0.05) { stillTimer += delta; } else { stillTimer = 0; }
  const hudOpacity = stillTimer > 3 ? 0.35 : 1;
  if(questEl) questEl.style.opacity = hudOpacity;

  // 骁龙 450 优化：视锥裁剪间隔增加
  cullCounter++;
  if(cullCounter >= CONFIG.RENDER.cullInterval) {
   updateCulling();
   cullCounter = 0;
  }
  if(cullCounter === 1) {
   cullableObjects.forEach(obj => {
    obj.visible = frustum.containsPoint(obj.position) && obj.position.distanceTo(player.mesh.position) < CONFIG.RENDER.viewDistance;
   });
  }

  // 移动
  const spd = (isRunning ? CONFIG.PLAYER.runSpeed : CONFIG.PLAYER.speed) * delta * 60;
  let moveX = 0, moveZ = 0;
  
  if(keys.w) joyVec.y = Math.max(joyVec.y, 1);
  else if(keys.s) joyVec.y = Math.min(joyVec.y, -1);
  if(keys.a) joyVec.x = Math.min(joyVec.x, -1);
  else if(keys.d) joyVec.x = Math.max(joyVec.x, 1);
  if(!keys.w && !keys.s && joyVec.y !== 0 && Math.abs(joyVec.y) < 0.2) joyVec.y = 0;
  if(!keys.a && !keys.d && joyVec.x !== 0 && Math.abs(joyVec.x) < 0.2) joyVec.x = 0;

  if(joyVec.length() > 0.1 && !gameState.get('ui.menuOpen') && !gameState.get('ui.settingsOpen') && !gameState.get('ui.inventoryOpen') && !gameState.get('ui.aboutOpen')) {
   const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
   fwd.y = 0; fwd.normalize();
   const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
   right.y = 0; right.normalize();
   moveX = right.x * joyVec.x + fwd.x * joyVec.y;
   moveZ = right.z * joyVec.x + fwd.z * joyVec.y;
   const newPos = new THREE.Vector3(player.mesh.position.x + moveX * spd, 0, player.mesh.position.z + moveZ * spd);
   const resolved = resolveCollision(newPos, CONFIG.PLAYER.radius);
   player.mesh.position.x = resolved.x;
   player.mesh.position.z = resolved.z;
   player.faceAngle = Math.atan2(moveX, moveZ);
   player.mesh.rotation.y = player.faceAngle;
   const eo = 0.2;
   player.eyes.left.position.set(-0.35 + moveX*eo, 0.15, 0.88 + moveZ*eo);
   player.eyes.right.position.set(0.35 + moveX*eo, 0.15, 0.88 + moveZ*eo);
  } else {
   player.eyes.left.position.lerp(new THREE.Vector3(-0.35, 0.15, 0.88), 0.1);
   player.eyes.right.position.lerp(new THREE.Vector3(0.35, 0.15, 0.88), 0.1);
  }

  // 地形跟随
  const terrainY = getTerrainHeight(player.mesh.position.x, player.mesh.position.z) + CONFIG.PLAYER.height;
  yVel -= CONFIG.PLAYER.gravity;
  player.mesh.position.y += yVel;
  if(player.mesh.position.y <= terrainY) {
   player.mesh.position.y = terrainY;
   yVel = 0;
   canJump = true;
  }
  if(!isFinite(yVel)) { yVel = 0; canJump = true; }
  if(!isFinite(player.mesh.position.y)) player.mesh.position.y = terrainY;
  if(!isFinite(player.mesh.position.x)) player.mesh.position.x = 0;
  if(!isFinite(player.mesh.position.z)) player.mesh.position.z = 0;

  // 武器动画
  if(!isAttacking) {
   player.weapon.rotation.y += 0.02;
   player.weapon.position.x = 1.6 * Math.cos(now * 0.002);
   player.weapon.position.z = 1.6 * Math.sin(now * 0.002);
  }
  ring.material.opacity = 0.5 + Math.sin(now * 0.003) * 0.1;

  // NPC - 性能优化：移除猫耳微动
  cat.floatPhase += delta * 1.5;
  const catTargetY = getTerrainHeight(2, 1.5) + 1.5;
  cat.mesh.position.lerp(player.mesh.position.clone().add(cat.offset).add(new THREE.Vector3(0, Math.sin(cat.floatPhase) * 0.2, 0)), 0.05);
  cat.mesh.lookAt(player.mesh.position);
  const catTerrainY = getTerrainHeight(cat.mesh.position.x, cat.mesh.position.z);
  if(cat.mesh.position.y < catTerrainY + 0.5) cat.mesh.position.y = catTerrainY + 1.5;

  const elderTerrainY = getTerrainHeight(-5, -3);
  elder.position.y = elderTerrainY + CONFIG.PLAYER.height;
  elder.lookAt(player.mesh.position);
  
  allNPCs.forEach(npc => {
   if(npc !== cat.mesh && npc !== elder) {
    const npcTerrainY = getTerrainHeight(npc.position.x, npc.position.z);
    npc.position.y = npcTerrainY + CONFIG.PLAYER.height;
    npc.lookAt(player.mesh.position);
   }
  });

  const pp = player.mesh.position;

  // 风车旋转（原始）
  windmills.forEach(w => { w.rotation.y += delta * 0.5; });

  // 碎片收集与罗盘 - 性能优化：移除浮动动画
  let nearestShard = null, nearestDistance = Infinity;
  shards.forEach(s => {
   if(!s.userData.collected) {
    // 简单自转
    s.rotation.y += 0.02;
    
    const dist = pp.distanceTo(s.position);
    if(dist < nearestDistance) { nearestDistance = dist; nearestShard = s.position; }
    if(dist < 2.5) {
     s.userData.collected = true;
     scene.remove(s);
     shardCount++;
     gameState.set('player.shards', shardCount);
     updateUI();
     gameEvents.emit('shard:collect', { count: shardCount });
    }
   }
  });

  // 区域访问
  regions.forEach(r => {
   if(pp.distanceTo(r.pos) < 15 && !gameState.state.player.regionsVisited.has(r.name)) {
    gameState.state.player.regionsVisited.add(r.name);
    uiManager.showNotification(`发现新区域：${r.name}`);
    gameEvents.emit('region:discover', { name: r.name });
   }
  });

  // 云朵/粒子
  // === 场景动画 - 性能优化版 ===
 // 云朵飘动（原始）
 clouds.forEach(c => c.position.x += c.userData.speed);
 
 // 萤火虫（原始）
 fireflies.position.y = pp.y + 3 + Math.sin(now * 0.001) * 1;
 
 // 闪光粒子（原始）
 sparkles.rotation.y += 0.0004;

  // 骁龙 450 优化：移除樱花花瓣动画（性能开销大）

  // 天气
  if(rainParticles) {
   const pos = rainParticles.geometry.attributes.position;
   for(let i = 0; i < pos.count; i++) {
    let y = pos.getY(i) - 0.3;
    if(y < -5) {
     y = 20;
     pos.setX(i, pp.x + (Math.random()-0.5)*200);
     pos.setZ(i, pp.z + (Math.random()-0.5)*200);
    }
    pos.setY(i, y);
   }
   pos.needsUpdate = true;
  }
  if(snowParticles) {
   const pos = snowParticles.geometry.attributes.position;
   for(let i = 0; i < pos.count; i++) {
    let y = pos.getY(i) - 0.06;
    if(y < -5) {
     y = 20;
     pos.setX(i, pp.x + (Math.random()-0.5)*200);
     pos.setZ(i, pp.z + (Math.random()-0.5)*200);
    }
    pos.setY(i, y);
    pos.setX(i, pos.getX(i) + Math.sin(now * 0.001 + i) * 0.01);
   }
   pos.needsUpdate = true;
  }

  // 名称标签显示/隐藏
  refreshNPCLables();
  npcLabels.forEach(label => {
   if(!label) return;
   const parent = label.parent;
   const pos = parent ? parent.position : label.position;
   const dist = pp.distanceTo(pos);
   label.visible = dist < CONFIG.UI.labelHideDist;
  });
  regionLabels.forEach(label => {
   const dist = pp.distanceTo(label.position);
   label.visible = dist < CONFIG.UI.labelHideDist;
  });
  stoneLabels.forEach(label => {
   const dist = pp.distanceTo(label.parent.position);
   label.visible = dist < CONFIG.UI.labelHideDist;
  });

  // 远处树木优化 - 根据画质分级处理
  const quality = parseInt(document.getElementById('qualitySelect')?.value || '2');
  
  if(quality >= 2) {
   // === 高画质模式 ===
   const highQualityTreeDist = 150; // 高画质视距提升到 150 米
   
   cullableObjects.forEach(obj => {
    if(obj.userData.isTree) {
     const dist = pp.distanceTo(obj.position);
     
     // 高画质：150 米内的树木都完整显示
     if(dist < highQualityTreeDist) {
      obj.visible = frustum.containsPoint(obj.position);
      
      // 保持完整材质，不降级
      if(obj.material && obj.material.color) {
       const treeType = obj.userData.treeType;
       if(isNight) {
        // 夜间远处树木变暗（>80 米）
        if(dist > 80) {
             const darkFactor = 0.3; // 夜间 30% 亮度
         obj.material.emissiveIntensity = 0;
        } else {
         // 近处树木保持正常
         if(treeType === 'pine') obj.material.emissiveIntensity = 0.2;
         else if(treeType === 'sakura') obj.material.emissiveIntensity = 0.35;
         else obj.material.emissiveIntensity = 0.25;
        }
       } else {
        // 白天正常发光
        if(treeType === 'pine') obj.material.emissiveIntensity = 0.2;
        else if(treeType === 'sakura') obj.material.emissiveIntensity = 0.35;
        else obj.material.emissiveIntensity = 0.25;
       }
      }
     } else {
      // 超出高画质视距的树木隐藏
      obj.visible = false;
     }
    }
   });
  } else {
   // === 低/中画质模式 ===
   const treeLODDist = 80;
   
   cullableObjects.forEach(obj => {
    if(obj.userData.isTree) {
     const dist = pp.distanceTo(obj.position);
     if(dist > treeLODDist) {
      obj.visible = frustum.containsPoint(obj.position) && dist < CONFIG.RENDER.viewDistance;
      
      // 低画质简化处理
      if(obj.material && obj.material.color) {
       if(isNight) {
        // 夜间变暗融入夜色
        const darkFactor = 0.25;
        obj.material.emissiveIntensity = 0;
       } else {
        // 白天降低发光
        obj.material.emissiveIntensity = 0.1;
       }
      }
     }
    }
   });
  }

  // 相机
  if(isDialogActive) {
   const npcPos = currentNPC.parent ? currentNPC.parent.position : currentNPC.position;
   const midPoint = new THREE.Vector3().lerpVectors(pp, npcPos, 0.5);
   const dialogDist = CONFIG.CAMERA.dialogDistance;
   const dialogHeight = CONFIG.CAMERA.dialogHeight;
   const camX = pp.x + Math.sin(dialogOrbitAngle) * dialogDist;
   const camZ = pp.z + Math.cos(dialogOrbitAngle) * dialogDist;
   camera.position.set(camX, pp.y + dialogHeight, camZ);
   camera.lookAt(midPoint);
  } else {
   const camDist = CONFIG.CAMERA.distance;
   const camX = pp.x + camDist * Math.sin(yaw) * Math.cos(pitch);
   const camY = pp.y + camDist * Math.sin(pitch) + CONFIG.CAMERA.height;
   const camZ = pp.z + camDist * Math.cos(yaw) * Math.cos(pitch);
   camera.position.set(camX, camY, camZ);
   camera.lookAt(pp.clone().add(new THREE.Vector3(0, 1.8, 0)));
  }
  


  // 接近检测
  if(now - lastProxCheck > CONFIG.PERFORMANCE.proximityCheckInterval) {
   updateStoryConfirms();
   lastProxCheck = now;
  }

  // FPS
  frames++;
  if(now - fpsTimer >= CONFIG.PERFORMANCE.fpsSampleWindow) {
   fps = Math.round(frames * 1000 / (now - fpsTimer));
   document.getElementById('fpsVal').textContent = fps;
   fpsTimer = now;
   frames = 0;
  }

  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
 } catch(e) {
  console.error('[Game animate error]', e);
 }
}

// ===================================================================
// 初始化
// ===================================================================

// 加载存档
if(SaveSystem.load()) {
 shardCount = gameState.get('player.shards') || 0;
 updateUI();
 if(gameState.get('player.secondWeekUnlocked')) unlockSecretCave();
 uiManager.showNotification('存档已加载');
}
SaveSystem.startAutoSave();
animate();

// 加载界面动画
const loadingScreen = document.getElementById('loading-screen');
const loadingText = document.getElementById('loading-text');
const baseText = 'loadinnnnnnng';
let charIndex = 0;

const typeInterval = setInterval(() => {
 if(charIndex < baseText.length) {
  charIndex++;
  loadingText.textContent = baseText.substring(0, charIndex);
 } else {
  clearInterval(typeInterval);
  setTimeout(() => {
   if(loadingScreen) {
    loadingScreen.style.opacity = '0';
    setTimeout(() => {
     loadingScreen.style.display = 'none';
     showTutorial();
    }, 500);
   }
  }, 800);
 }
}, 120);

// 横屏检测
setTimeout(() => { checkOrientation(); }, 1000);

function checkOrientation() {
 const h = document.getElementById('landscape-hint');
 if(innerWidth < innerHeight && /Android|iPhone|iPad|iPod/i.test(navigator.userAgent))
  h.classList.add('show');
 else
  h.classList.remove('show');
}

window.addEventListener('resize', () => {
 camera.aspect = innerWidth / innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth, innerHeight);
 labelRenderer.setSize(innerWidth, innerHeight);
 checkOrientation();
});

// 拍照模式
let photoMode = false;
document.addEventListener('keydown', e => {
 if(e.key === 'p' || e.key === 'P') {
  photoMode = !photoMode;
  document.getElementById('game-container').classList.toggle('photo-mode', photoMode);
  if(photoMode) {
   setTimeout(() => { takeScreenshot(); }, 400);
  }
 }
});

window.addEventListener('beforeunload', () => {
 running = false;
 if(autoTimer) clearInterval(autoTimer);
 [cat, elder].forEach(npc => { if(npc.pendingTimer) clearTimeout(npc.pendingTimer); });
 SaveSystem.save();
 SaveSystem.stopAutoSave();
});

// ===================================================================
console.log('已加载');
</script>
