 /* ===== CSS 变量统一 ===== */
:root {
 --glass-bg: rgba(100,180,255,0.35);
 --glass-bg-light: rgba(100,180,255,0.25);
 --glass-bg-heavy: rgba(100,180,255,0.45);
 --glass-border: rgba(140,200,255,0.45);
 --glass-blur: 20px;
 --glass-radius: 18px;
 --glass-shadow: 0 4px 24px rgba(0,0,0,0.15);
 --text-primary: rgba(255,255,255,0.95);
 --text-secondary: rgba(255,255,255,0.85);
 --text-muted: rgba(255,255,255,0.6);
 --accent-color: rgba(100,180,255,0.9);
 --theme-hue: 200;
 --transition-fast: 0.15s;
 --transition-normal: 0.2s;
}

/* 主题色 - 初音绿 */
[data-theme="miku"] {
 --glass-bg: rgba(57,197,187,0.35);
 --glass-bg-light: rgba(57,197,187,0.25);
 --glass-bg-heavy: rgba(57,197,187,0.45);
 --glass-border: rgba(86,235,224,0.45);
 --accent-color: rgba(57,197,187,0.9);
 --theme-hue: 175;
}

/* 主题色 - 哔哩粉 */
[data-theme="bilibili"] {
 --glass-bg: rgba(251,114,153,0.35);
 --glass-bg-light: rgba(251,114,153,0.25);
 --glass-bg-heavy: rgba(251,114,153,0.45);
 --glass-border: rgba(255,150,180,0.45);
 --accent-color: rgba(251,114,153,0.9);
 --theme-hue: 340;
}

/* 主题色 - 天依蓝 */
[data-theme="tianyi"] {
 --glass-bg: rgba(100,180,255,0.35);
 --glass-bg-light: rgba(100,180,255,0.25);
 --glass-bg-heavy: rgba(100,180,255,0.45);
 --glass-border: rgba(140,200,255,0.45);
 --accent-color: rgba(100,180,255,0.9);
 --theme-hue: 200;
}

/* 主题色 - 亚北黄 */
[data-theme="yanbei"] {
 --glass-bg: rgba(255,200,80,0.35);
 --glass-bg-light: rgba(255,200,80,0.25);
 --glass-bg-heavy: rgba(255,200,80,0.45);
 --glass-border: rgba(255,220,120,0.45);
 --accent-color: rgba(255,200,80,0.9);
 --theme-hue: 45;
}

 /* ===== 基础重置 ===== */
 * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
 body { 
  background:#b8d8e8; 
  overflow:hidden; 
  touch-action:none; 
  font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;
 }
 button, input, select, textarea { font-family:inherit; }

/* ===== 玻璃效果工具类 保留毛玻璃效果 ===== */
 .glass {
  background: var(--glass-bg) !important;
  backdrop-filter: blur(12px) saturate(180%) !important;
  -webkit-backdrop-filter: blur(12px) saturate(180%) !important;
  border: 1px solid var(--glass-border) !important;
  box-shadow: var(--glass-shadow) !important;
  border-radius: var(--glass-radius);
 }
 
/* ===== 场景增强效果类 移除所有自动动画 ===== */
/* 老电脑友好：不启用自动动画 */
 .glass-light { 
  background: var(--glass-bg-light) !important;
  backdrop-filter: blur(8px) !important;
  -webkit-backdrop-filter: blur(8px) !important;
 }
 .glass-heavy { 
  background: var(--glass-bg-heavy) !important;
  backdrop-filter: blur(12px) !important;
  -webkit-backdrop-filter: blur(12px) !important;
 }

 /* ===== 加载屏幕 ===== */
 #loading-screen {
  position: fixed; inset: 0;
  background: #ffffff; z-index: 99999;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity 0.5s ease;
 }
 #loading-text {
  font-size: 28px; color: #1a1a1a; font-weight: 200;
  letter-spacing: 4px; font-family: 'Noto Sans SC', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  min-width: 400px; text-align: center;
  animation: pulse 2s ease-in-out infinite;
 }
 @keyframes pulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
 }
 
 /* ===== 横屏提示 ===== */
 #landscape-hint {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.95); z-index: 100000;
  flex-direction: column; align-items: center; justify-content: center;
  color: #fff; text-align: center;
 }
 #landscape-hint.show { display: flex; }
 #landscape-hint svg { width: 80px; height: 80px; margin-bottom: 24px; fill: #fff; animation: rotateHint 3s ease-in-out infinite; }
 @keyframes rotateHint {
  0%, 100% { transform: rotate(-10deg); }
  50% { transform: rotate(10deg); }
 }
 #landscape-hint p { font-size: 20px; margin-bottom: 12px; font-weight: 300; }
 
 /* ===== 图标按钮 - 恢复毛玻璃效果 ===== */
 .icon-btn {
  width:44px; height:44px; border-radius:16px;
  background: rgba(255,255,255,0.08) !important;
  backdrop-filter: blur(12px) saturate(180%) !important;
  -webkit-backdrop-filter: blur(12px) saturate(180%) !important;
  border: 1px solid rgba(255,255,255,0.18) !important;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; color:var(--text-secondary);
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  transition: transform 0.15s ease, background 0.15s ease !important;
  cursor:pointer;
  pointer-events:auto !important;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  will-change: transform;
 }
 .icon-btn:active { background:rgba(255,255,255,0.18) !important; transform:scale(0.90); }
 .icon-btn:hover { transform:scale(1.05); background:rgba(255,255,255,0.12) !important; }
 .icon-btn[aria-label] { position: relative; }
 .text-btn { width:auto; padding:0 16px; font-size:15px; font-weight:bold; }
 
/* ===== 顶部栏 - 性能优化：移除入场动画 ===== */

 /* ===== 顶部栏 ===== */
 #top-bar { 
  position:absolute; top:16px; left:16px; right:16px; z-index:1000; 
  display:flex; justify-content:space-between; pointer-events:none; 
 }
 #top-left, #top-right { display:flex; gap:8px; pointer-events:auto; }

 /* ===== FPS 窗口 ===== */
 #fps-badge {
  position:absolute; bottom:16px; right:16px;
  background:rgba(255,255,255,0.08) !important;
  backdrop-filter: blur(8px) !important;
  -webkit-backdrop-filter: blur(8px) !important;
  padding:4px 12px; border-radius:14px;
  color:var(--text-muted); font-size:13px;
  border:1px solid rgba(255,255,255,0.15) !important;
  z-index:100;
 }

 /* ===== 任务面板 ===== */
 #quest-panel {
  position: absolute; top: 16px; left: 70px; z-index: 50;
  background: var(--glass-bg);
  padding: 8px; border-radius: 18px;
  border: 1px solid var(--glass-border);
  width: 200px; box-shadow: var(--glass-shadow);
  display: none; cursor: pointer;
 }
 #quest-panel:not(.hidden) { display: block; }
 .quest-item {
  padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
  font-size: 12px; color: var(--text-secondary); line-height: 1.5;
  transition: transform 0.15s ease;
 }
 .quest-item:hover { transform: translateX(4px); }
 .quest-item:last-child { border-bottom: none; }
 .quest-item.active { color: var(--text-primary); font-weight: 500; }
 .quest-item.completed { color: rgba(255,255,255,0.4); text-decoration: line-through; }
 .quest-icon { margin-right: 5px; }
 
 /* ===== 动态摇杆 - 性能优化：移除入场动画 ===== */
 #dynamic-joystick {
  position:absolute; width:130px; height:130px;
  background:rgba(255,255,255,0.06) !important;
  backdrop-filter: blur(8px) !important;
  -webkit-backdrop-filter: blur(8px) !important;
  border-radius:999px;
  border:1px solid rgba(255,255,255,0.15) !important;
  z-index:45; display:block; pointer-events:none; bottom:60px; left:20px;
 }
 #dynamic-thumb {
  position:absolute; width:56px; height:56px;
  background:rgba(255,255,255,0.25); border-radius:28px;
  left:37px; top:37px;
  box-shadow:0 0 16px rgba(255,255,255,0.3);
  border:1px solid rgba(255,255,255,0.35);
 }

 /* ===== 动作面板 移除入场动画 ===== */
 #action-panel { position:absolute; bottom:60px; right:20px; z-index:40; display:flex; flex-direction:row; gap:12px; pointer-events:auto; }
 .action-btn {
  width:68px; height:68px; border-radius:18px;
  background:rgba(255,255,255,0.08) !important;
  backdrop-filter: blur(12px) saturate(180%) !important;
  -webkit-backdrop-filter: blur(12px) saturate(180%) !important;
  border:1px solid rgba(255,255,255,0.15) !important;
  color:var(--text-secondary); font-size:30px;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 4px 0 rgba(0,0,0,0.2);
  pointer-events:auto;
  transition: transform 0.06s ease, box-shadow 0.06s ease, background 0.15s ease !important;
  touch-action:manipulation;
  cursor:pointer;
  will-change: transform;
 }
 .action-btn:active { transform:translateY(4px) scale(0.95); box-shadow:none; background:rgba(255,255,255,0.18) !important; }
 .action-btn:hover { transform:scale(1.05); background:rgba(255,255,255,0.12) !important; }

 /* ===== 菜单面板 ===== */
 #menu-panel {
 position: absolute; top: 70px; left: 16px; width: 200px; z-index: 1000;
 background: var(--glass-bg);
 backdrop-filter: blur(var(--glass-blur)) saturate(120%); -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(120%);
 border-radius: var(--glass-radius); padding: 8px; border: 1px solid var(--glass-border);
 box-shadow: var(--glass-shadow);
 display: none !important;
 flex-direction: column; gap: 4px;
 }
 #menu-panel.show {
  display: flex !important;
  opacity: 1;
  transform: translateY(0) scale(1);
 }
 .menu-item {
  padding: 10px 14px; background: rgba(255,255,255,0.08);
  border-radius: 12px; color: var(--text-secondary); font-size: 14px; cursor: pointer;
  transition: transform 0.15s ease, background 0.15s ease !important;
  border: 1px solid rgba(255,255,255,0.1);
  will-change: transform;
 }
 .menu-item:active { background: rgba(255,255,255,0.16); transform: scale(0.96); }
 .menu-item:hover { transform: translateX(4px); background: rgba(255,255,255,0.12); }
 .menu-item:focus { outline: 2px solid var(--accent-color); outline-offset: 2px; }

 /* ===== 关于面板 ===== */
 #about-panel {
 position: absolute; top: 120px; left: 16px; width: 220px; z-index: 60;
 background: var(--glass-bg);
 backdrop-filter: blur(var(--glass-blur)) saturate(110%); -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(110%);
 border-radius: 18px; padding: 16px; border: 1px solid var(--glass-border);
 display: none; flex-direction: column; gap: 10px;
 box-shadow: var(--glass-shadow); opacity: 0; transition: opacity 0.2s ease;
 }
 #about-panel.show { opacity: 1; }

 /* ===== 日记面板 ===== */
 #diary-panel {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.95);
  z-index:300; background:var(--glass-bg);
  backdrop-filter:blur(var(--glass-blur)) saturate(115%); -webkit-backdrop-filter:blur(var(--glass-blur)) saturate(115%);
  border-radius:var(--glass-radius); padding:0;
  border:1px solid var(--glass-border);
  display:none; flex-direction:column; gap:0;
  width:400px; max-width:90vw; max-height:80vh;
  opacity:0; transition:transform 0.2s ease, opacity 0.2s ease;
  box-shadow:var(--glass-shadow);
 }
 #diary-panel.show { transform:translate(-50%,-50%) scale(1); opacity:1; }

 /* ===== 背包面板 ===== */
 #inventory-panel {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.96);
  z-index:1000;
  background:var(--glass-bg) !important;
  backdrop-filter:blur(40px) saturate(180%); -webkit-backdrop-filter:blur(40px) saturate(180%);
  border-radius:var(--glass-radius); padding:0;
  border:1px solid var(--glass-border) !important;
  display:none; flex-direction:column;
  width:380px; max-width:92vw; max-height:78vh;
  opacity:0; transition:transform 0.2s ease, opacity 0.2s ease;
  box-shadow:var(--glass-shadow), 0 0 60px rgba(120,180,255,0.1) inset;
  overflow:hidden;
  pointer-events:auto !important;
  will-change:transform, opacity;
 }
 #inventory-panel.show { transform:translate(-50%,-50%) scale(1); opacity:1; }
 .inventory-header {
  display:flex; justify-content:space-between; align-items:center;
  color:var(--text-primary); font-size:15px; font-weight:600;
  padding:14px 18px;
  background:rgba(255,255,255,0.08);
  border-radius:18px 18px 0 0;
  letter-spacing:0.3px;
 }
 .inventory-close {
 width:28px; height:28px; display:flex; align-items:center; justify-content:center;
 border-radius:50%; background:rgba(255,255,255,0.08); cursor:pointer;
 color:var(--text-muted); font-size:11px; border:none;
 transition:all 0.15s ease;
}
.inventory-close:hover { background:rgba(255,100,100,0.15); color:rgba(255,150,150,0.9); }
 .inventory-content { padding: 14px 18px; max-height: 320px; overflow-y: auto; }
 .inventory-item {
  padding: 10px 14px; background: var(--glass-bg-light);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  border-radius: 12px; color: var(--text-secondary); font-size: 14px;
  border: 1px solid var(--glass-border); margin-bottom: 8px;
  transition: transform 0.15s ease;
 }
 .inventory-item:hover { transform: translateX(4px); }

 /* ===== 传送面板 ===== */
 #teleport-panel {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.96);
  z-index:1000;
  background:var(--glass-bg) !important;
  backdrop-filter:blur(40px) saturate(180%); -webkit-backdrop-filter:blur(40px) saturate(180%);
  border-radius:var(--glass-radius); padding:0;
  border:1px solid var(--glass-border) !important;
  display:none; flex-direction:column;
  width:420px; max-width:92vw; max-height:78vh;
  opacity:0; transition:transform 0.2s ease, opacity 0.2s ease;
  box-shadow:var(--glass-shadow), 0 0 60px rgba(120,180,255,0.1) inset;
  overflow:hidden;
  pointer-events:auto !important;
  will-change:transform, opacity;
 }
 #teleport-panel.show { transform:translate(-50%,-50%) scale(1); opacity:1; }
 .tp-header {
  display:flex; justify-content:space-between; align-items:center;
  color:var(--text-primary); font-size:15px; font-weight:600;
  padding:14px 18px;
  background:rgba(255,255,255,0.08);
  border-radius:18px 18px 0 0;
  letter-spacing:0.3px;
 }
 .tp-close {
 width:28px; height:28px; display:flex; align-items:center; justify-content:center;
 border-radius:50%; background:rgba(255,255,255,0.08); cursor:pointer;
 color:var(--text-muted); font-size:11px; border:none;
 transition:all 0.15s ease;
}
.tp-close:hover { background:rgba(255,100,100,0.15); color:rgba(255,150,150,0.9); }
 .tp-content { padding:16px 24px; max-height:320px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }
 .tp-item {
  padding:14px 18px; background:var(--glass-bg-light);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  border-radius:14px; color:rgba(255,255,255,0.85); font-size:15px; cursor:pointer;
  border:1px solid var(--glass-border);
  display:flex; justify-content:space-between; align-items:center;
  transition: transform 0.15s ease, background 0.15s ease !important;
  will-change: transform;
 }
 .tp-item:active { background:var(--glass-bg); transform: scale(0.98); }
 .tp-item:hover { background:var(--glass-bg); transform: translateX(4px); }
 .tp-item .tp-arrow { color:rgba(255,255,255,0.5); font-size:18px; }
 .tp-item.locked { opacity:0.4; pointer-events:none; }
 .tp-item .tp-lock { font-size:14px; }

 /* ===== 音乐面板 ===== */
#music-panel {
 position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.96);
 z-index:1000;
 background:var(--glass-bg) !important;
 backdrop-filter:blur(40px) saturate(180%); -webkit-backdrop-filter:blur(40px) saturate(180%);
 border-radius:var(--glass-radius); padding:0;
 border:1px solid var(--glass-border) !important;
 display:none; flex-direction:column;
 width:620px; max-width:92vw; max-height:78vh;
 opacity:0; transition:transform 0.2s ease, opacity 0.2s ease;
 box-shadow:var(--glass-shadow), 0 0 60px rgba(120,180,255,0.1) inset;
 overflow:hidden;
 pointer-events:auto !important;
 will-change:transform, opacity;
}
#music-panel.show { transform:translate(-50%,-50%) scale(1); opacity:1; }
.music-header {
 display:flex; justify-content:space-between; align-items:center;
 color:var(--text-primary); font-size:15px; font-weight:600;
 padding:14px 18px;
 background:rgba(255,255,255,0.08);
 border-radius:18px 18px 0 0;
 letter-spacing:0.3px;
}
.music-close {
 width:28px; height:28px; display:flex; align-items:center; justify-content:center;
 border-radius:50%; background:rgba(255,255,255,0.08); cursor:pointer;
 color:var(--text-muted); font-size:11px; border:none;
 transition:all 0.15s ease;
}
.music-close:hover { background:rgba(255,100,100,0.15); color:rgba(255,150,150,0.9); }
.music-body {
 display:flex; flex-direction:row; height:350px;
}
.music-left {
 width:44%; padding:14px;
 display:flex; flex-direction:column;
 border-right:1px solid rgba(255,255,255,0.06);
 background:rgba(0,0,0,0.12);
 overflow:hidden;
 min-height:0;
}
.music-right {
 width:56%; padding:20px;
 display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;
 background:rgba(255,255,255,0.03);
}
.music-section-title {
 display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;
}
.music-section-title > span {
 font-size:11px; color:var(--text-muted); font-weight:500;
 letter-spacing:0.8px; text-transform:uppercase;
}
.music-add-btn {
 display:flex; align-items:center; gap:4px; padding:5px 12px;
 border-radius:6px;
 background:rgba(255,255,255,0.06); cursor:pointer;
 color:var(--text-primary); font-size:11px; font-weight:500;
 border:1px solid rgba(255,255,255,0.12);
 transition:all 0.15s ease;
}
.music-add-btn:hover { background:rgba(255,255,255,0.12); color:var(--text-primary); }
.music-list {
 flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:2px;
 min-height:0;
}
/* 收藏夹栏 */
.music-folder-bar {
 display:flex; gap:4px; padding:6px 0; overflow-x:auto; flex-shrink:0;
 position:relative; z-index:5;
}
.music-folder-bar::-webkit-scrollbar { height:3px; }
.music-folder-bar::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }
.music-folder-item {

 padding:4px 10px; border-radius:8px;
 background:rgba(255,255,255,0.06); cursor:pointer;
 color:var(--text-secondary); font-size:11px; white-space:nowrap;
 border:1px solid transparent;
 transition:all 0.15s ease; flex-shrink:0; position:relative;
}
.music-folder-item:hover { background:rgba(255,255,255,0.1); }
.music-folder-item.active { background:rgba(255,255,255,0.12); border-color:rgba(255,255,255,0.15); color:var(--text-primary); }
.music-folder-item .folder-name { max-width:80px; overflow:hidden; text-overflow:ellipsis; }
.music-folder-item .folder-dot {

 border-radius:4px; cursor:pointer; color:var(--text-muted); font-size:14px;
 transition:color 0.15s; flex-shrink:0;
}
.music-folder-item .folder-dot:hover { color:var(--text-primary); }
.music-folder-add {
 width:28px; height:28px; display:flex; align-items:center; justify-content:center;
 border-radius:8px; background:rgba(255,255,255,0.06); cursor:pointer;
 color:var(--text-muted); font-size:14px; border:1px dashed rgba(255,255,255,0.15);
 transition:all 0.15s ease; flex-shrink:0;
}
.music-folder-add:hover { background:rgba(255,255,255,0.1); color:var(--text-secondary); }
/* 多选操作栏 */

 // 音频管理器 - BGM 控制
 class AudioManager {
  constructor(){
   this.audio = new Audio();
   this.audio.loop = false; // 关闭循环，让ended事件触发自动切换
   this.audio.preload = 'auto';
   this.volume = 0.4;
   this.audio.volume = this.volume;
   this._playing = false;
   this._trackId = null;
   this._cache = new Map(); // 音频缓存
   this._loading = new Set(); // 正在加载的曲目
   this.audio.addEventListener('playing', () => { this._playing = true; });
   this.audio.addEventListener('pause', () => { this._playing = false; });
   this.audio.addEventListener('ended', () => {
    // 根据播放模式决定下一首
    var allIds = getAllTrackIds();
    if(allIds.length === 0) return;
    if(playMode === 0) {
     // 顺序播放
     currentTrackIndex = (currentTrackIndex + 1) % allIds.length;
    } else if(playMode === 1) {
     // 随机播放
     currentTrackIndex = Math.floor(Math.random() * allIds.length);
    }
    // 单曲循环时不改变索引
    playTrackById(allIds[currentTrackIndex], currentTrackIndex);
   });
   this.audio.addEventListener('error', (e) => {
    console.warn('[BGM] 音频错误:', this.audio.error ? this.audio.error.message : e);
    this._playing = false;
   });
   // 持续同步播放状态
   this.audio.addEventListener('timeupdate', () => {
    if(this.audio.paused && this._playing) this._playing = false;
    if(!this.audio.paused && !this._playing) this._playing = true;
   });
  }
  
  get isPlaying(){ return this._playing; }
  get currentTrackId(){ return this._trackId; }
  
  // 预加载所有曲目（fetch + Blob URL 缓存）
  preloadAll(){
   console.log('[BGM] 开始预加载音乐...');
   var self = this;
   var ids = Object.keys(BGM_TRACKS);
   // 先预加载前3首，其余延迟
   var first = ids.slice(0, 3);
   var rest = ids.slice(3);
   first.forEach(function(id) { self._prefetchTrack(id); });
   setTimeout(function() {
    rest.forEach(function(id) { self._prefetchTrack(id); });
   }, 5000);
  }

  _prefetchTrack(id){
   var track = BGM_TRACKS[id];
   if(!track || !track.url || this._cache.has(id)) return;
   var self = this;
   fetch(track.url, {mode:'cors'}).then(function(resp){
    if(!resp.ok) throw new Error('HTTP ' + resp.status);
    return resp.blob();
   }).then(function(blob){
    var blobUrl = URL.createObjectURL(blob);
    self._cache.set(id, blobUrl);
    // 替换原 URL 为 Blob URL
    BGM_TRACKS[id].url = blobUrl;
    console.log('[BGM] 缓存完成:', id);
   }).catch(function(err){
    console.warn('[BGM] 预加载失败:', id, err.message);
   });
  }
  
  loadAndPlay(trackId, url){
   let trackUrl = url;
   if(!trackUrl) {
    const track = BGM_TRACKS[trackId];
    if(!track) { console.warn('[BGM] 曲目不存在:', trackId); return; }
    trackUrl = track.url;
   }
   this._trackId = trackId;
   this.audio.src = trackUrl;
   this.audio.volume = this.volume;
   this.audio.load();
   var self = this;
   this.audio.play().then(function(){
    self._playing = true;
    console.log('[BGM] 正在播放:', trackId);
   }).catch(function(err){
    console.warn('[BGM] play() 被阻止:', err);
    self._playing = false;
   });
  }
  
  play(){
   if(!this.audio.src) return;
   var self = this;
   this._playing = true; // 立即标记为播放中
   this.audio.play().then(function(){
    self._playing = true;
   }).catch(function(err){
    console.warn('[BGM] play() 失败:', err);
    self._playing = false;
   });
  }
  
  pause(){
   this.audio.pause();
   this._playing = false;
  }
  
  toggle(){
   if(this._playing) { this.pause(); }
   else { this.play(); }
   return this._playing;
  }
  
  setVolume(v){
   this.volume = Math.max(0, Math.min(1, v));
   this.audio.volume = this.volume;
  }

  // 添加在线/本地曲目到曲库
  addTrack(id, trackInfo) {
   BGM_TRACKS[id] = trackInfo;
   console.log('[BGM] 添加曲目:', id, trackInfo.name);
  }

  // 直接播放 URL（用于试听）
  playUrl(url, name) {
   this._trackId = '__preview__';
   this.audio.src = url;
   this.audio.volume = this.volume;
   this.audio.load();
   var self = this;
   this.audio.play().then(function(){
    self._playing = true;
    console.log('[BGM] 试听:', name);
   }).catch(function(err){
    console.warn('[BGM] 试听失败:', err);
    self._playing = false;
   });
  }
  
  getIsPlaying(){ return this._playing; }
 }

// 地面颜色亮度系数：晴天1.0，阴雨雪0.7
let terrainBrightness = 1.0;

function createTerrain(size, segments, roughness) {
 const geo = new THREE.PlaneGeometry(size, size, segments, segments);
 geo.rotateX(-Math.PI/2);
 const pos = geo.attributes.position;
 const colors = new Float32Array(pos.count * 3);
 
 for(let i = 0; i < pos.count; i++){
  const x = pos.getX(i), z = pos.getZ(i);
  let h = 0;
  
  h += Math.sin(x*0.015)*Math.cos(z*0.015)*8;
  h += Math.sin(x*0.04+0.8)*Math.cos(z*0.03+1.2)*5;
  h += Math.sin(x*0.08+2.1)*Math.cos(z*0.06+0.5)*2.5;
  
  const riverCenter = Math.sin(x*0.03)*30;
  const riverDist = Math.abs(z - riverCenter);
  if(riverDist < 10) {
   const smoothT = riverDist / 10;
   const smoothCurve = smoothT * smoothT * (3 - 2 * smoothT);
   h -= 3.0 * (1 - smoothCurve);
  }
  
  const distFromCenter = Math.sqrt(x*x + z*z);
  if(distFromCenter < 15) h *= distFromCenter/15;
  
  pos.setY(i, h*roughness);
  
  const actualY = h * roughness;
  let r, g, b;
  const br = terrainBrightness; // 晴天1.0，阴雨雪0.7
  
  if (actualY < -0.5) { r = 0.50*br; g = 0.35*br; b = 0.25*br; } // 河床深褐色
  else if (actualY < 1) {
   const t = (actualY + 0.5) / 1.5;
   const noise = Math.sin(x*0.04) * Math.cos(z*0.04) * 0.25 + 0.75;
   r = (0.45 + noise * 0.10)*br; g = (0.50 + noise * 0.15)*br; b = (0.25 + noise * 0.08)*br; // 浅草绿
  } else if (actualY < 6) {
   const noise = Math.sin(x*0.03) * Math.cos(z*0.03) * 0.3 + 0.7;
   r = (0.40 - noise * 0.08)*br; g = (0.55 + noise * 0.12)*br; b = (0.25 + noise * 0.06)*br; // 中草绿
  } else if (actualY < 12) {
   const noise = Math.sin(x*0.025 + 0.5) * Math.cos(z*0.025 - 0.3) * 0.35 + 0.65;
   r = (0.35 + noise * 0.08)*br; g = (0.60 + noise * 0.10)*br; b = (0.28 + noise * 0.05)*br; // 深草绿
  } else {
   const noise = Math.sin(x*0.02) * Math.cos(z*0.02) * 0.4 + 0.6;
   r = (0.30 + noise * 0.08)*br; g = (0.50 + noise * 0.12)*br; b = (0.25 + noise * 0.05)*br; // 高山深绿
  }
  
  colors[i*3] = r; colors[i*3+1] = g; colors[i*3+2] = b;
 }
 
 geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
 geo.computeVertexNormals();
 return geo;
}

// 骁龙 450 优化：精简粒子系统，只保留必要的
function createParticles(count, spread, height, color, size, blending) {
 const geo = new THREE.BufferGeometry();
 const pos = new Float32Array(count*3);
 const col = new Float32Array(count*3);
 const c = new THREE.Color(color);
 for(let i = 0; i < count; i++) {
  pos[i*3] = (Math.random()-0.5)*spread;
  pos[i*3+1] = height[0]+Math.random()*(height[1]-height[0]);
  pos[i*3+2] = (Math.random()-0.5)*spread;
  col[i*3] = c.r; col[i*3+1] = c.g; col[i*3+2] = c.b;
 }
 geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
 geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
 return new THREE.Points(geo, new THREE.PointsMaterial({ size, vertexColors: true, transparent: true, blending: blending||THREE.AdditiveBlending, opacity: 0.6 }));
}

// 使用自定义 Shader 实现草地动画

// 草地顶点 Shader
const grassVertexShader = `
varying vec2 vUv;
varying vec3 vPosition;
uniform float time;
uniform vec3 cameraPos;
uniform vec3 playerPos;

void main() {
 vUv = uv;
 vPosition = position;
 
 // 基础位置
 vec3 pos = position;
 
 // 风力摆动（正弦波）
 float wind = sin(time * 2.0 + position.y * 3.0) * 0.05;
 pos.x += wind * position.y;
 pos.z += cos(time * 1.5 + position.y * 2.0) * 0.05;
 
 // 玩家压倒效果（圆形范围）
 float distToPlayer = distance(pos.xz, playerPos.xz);
 float squashRadius = 3.0;
 float squashStrength = 0.8;
 if(distToPlayer < squashRadius) {
  float squash = 1.0 - smoothstep(0.0, squashRadius, distToPlayer);
  pos.x += (pos.x - playerPos.x) * squash * squashStrength;
  pos.z += (pos.z - playerPos.z) * squash * squashStrength;
  pos.y *= (1.0 - squash * 0.6); // 压低
 }
 
 vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
 gl_Position = projectionMatrix * mvPosition;
}
`;

// 草地片段 Shader
const grassFragmentShader = `
varying vec2 vUv;
varying vec3 vPosition;
uniform vec3 grassColor;
uniform float opacity;

void main() {
 // 上尖下宽：使用三角形渐变
 float alpha = smoothstep(0.0, 0.1, vUv.y) * (1.0 - smoothstep(0.85, 1.0, vUv.y));
 
 // 颜色渐变（底部深，顶部浅）
 vec3 color = grassColor * (0.7 + vUv.y * 0.3);
 
 gl_FragColor = vec4(color, alpha * opacity);
}
`;

// 【画面优化 v42】草地颜色 - 晴天亮色 / 阴雨雪暗色
const grassColorsSunny = [0x6ab342, 0x7ab342, 0x8ab342, 0x7ab852, 0x7aa842, 0x6ab842]; // 亮绿色系
const grassColorsDark  = [0x3d7a2a, 0x4a8a35, 0x55943e, 0x4a8a35, 0x508f38, 0x3d8530]; // 深绿色系

const grassBladeGeo = new THREE.PlaneGeometry(0.08, 0.5); // 超细：宽 0.08

// 灌木丛位置（草丛生效源）
const bushSources = [
 { x: 20, z: 12 }, { x: -12, z: 10 }, { x: -8, z: -15 },
 { x: 65, z: 45 }, { x: 70, z: 60 }, { x: 82, z: 42 },
 { x: -52, z: 75 }, { x: -48, z: 90 },
 { x: 80, z: -48 }, { x: 85, z: -68 },
 { x: -60, z: -48 }, { x: -55, z: -35 },
 { x: 35, z: -78 }, { x: 62, z: -80 },
 { x: -30, z: 80 }, { x: -20, z: 105 }
];

const grassClusters = [];
const grassArea = 300; // 全地图范围

// 移动端优化 - 减少草地密度
const superClusterCount = 800;

for(let s = 0; s < superClusterCount; s++) {
 const scx = (Math.random() - 0.5) * grassArea;
 const scz = (Math.random() - 0.5) * grassArea;
 
 if(!isOnWater(scx, scz)) {
  const scy = getTerrainHeight(scx, scz);
  
  // 超级簇内 2-4 个普通簇
  const normalClusters = 2 + Math.floor(Math.random() * 3);
  
  for(let c = 0; c < normalClusters; c++) {
   // 普通簇在超级簇内偏移（5-15 单位）
   const offsetAngle = Math.random() * Math.PI * 2;
   const offsetDist = 5 + Math.random() * 10;
   const cx = scx + Math.cos(offsetAngle) * offsetDist;
   const cz = scz + Math.sin(offsetAngle) * offsetDist;
   
   if(!isOnWater(cx, cz)) {
    const cy = getTerrainHeight(cx, cz);
    
    // 根据高度决定草密度
    let grassDensity = 0;
    let heightRange = [0, 0];
    
    if(cy >= 1 && cy <= 8) {
     // 纯绿色：每簇 3-5 根
     grassDensity = 3 + Math.floor(Math.random() * 3);
     heightRange = [0.35, 0.65];
    } else if(cy >= -0.5 && cy < 1) {
     // 黄绿色：稀疏 40%
     if(Math.random() > 0.6) continue;
     grassDensity = 2 + Math.floor(Math.random() * 2);
     heightRange = [0.25, 0.5];
    } else if(cy > 8 && cy <= 11) {
     // 高山黄/棕：很稀疏 20%
     if(Math.random() > 0.8) continue;
     grassDensity = 1 + Math.floor(Math.random() * 2);
     heightRange = [0.2, 0.4];
    } else {
     continue;
    }
    
    // 灌木丛效应
    let minBushDist = Infinity;
    bushSources.forEach(b => {
     const d = Math.sqrt((cx-b.x)**2 + (cz-b.z)**2);
     if(d < minBushDist) minBushDist = d;
    });
    const bushEffect = Math.max(0, 1.0 - minBushDist / 30);
    
    for(let i = 0; i < grassDensity; i++) {
     const angle = Math.random() * Math.PI * 2;
     const radius = 0.25 + Math.random() * 0.35;
     const gx = cx + Math.cos(angle) * radius;
     const gz = cz + Math.sin(angle) * radius;
     const gy = getTerrainHeight(gx, gz);
     
     const baseHeight = heightRange[0] + Math.random() * (heightRange[1] - heightRange[0]);
     const bushBonus = bushEffect * 0.2 * Math.random();
     const height = baseHeight + bushBonus;
     
     grassClusters.push({ x: gx, y: gy, z: gz, h: height, r: Math.random() * Math.PI * 2 });
    }
   }
  }
 }
}

const stones = [];
function addStone(data) {
 const stone = new THREE.Mesh(new THREE.BoxGeometry(1, 1.3, 0.35), paleMaterial(0xd8c8e8, {roughness:0.55, emissive:0x6655aa, emissiveIntensity:0.1}));
 stone.position.set(data.x, getTerrainHeight(data.x,data.z)+0.65, data.z);
 stone.userData = { type:'stone', title:data.title, content:data.content, region:data.region, isSecret:data.isSecret||false };
 stone.receiveShadow = true; stone.castShadow = true; scene.add(stone);
 
 const labelDiv = document.createElement('div');
 labelDiv.textContent = data.title;
 labelDiv.style.cssText = 'color:rgba(255,255,255,0.8);font-size:13px;background:rgba(80,140,200,0.35);padding:4px 12px;border-radius:16px;border:1px solid rgba(120,180,255,0.45);pointer-events:none;';
 const label = new CSS2DObject(labelDiv);
 label.position.set(0, 1.2, 0);
 stone.add(label);
 label.element.classList.add('stone-label');
 stones.push(stone);
 obstacles.push({ pos: new THREE.Vector3(data.x,0,data.z), radius: 0.5 });
 addToGrid({ pos: new THREE.Vector3(data.x,0,data.z), radius: 0.5 });
}
stonesData.forEach(s => { if(!s.isSecret) addStone(s); });

const secretCave = { name:'???', pos:new THREE.Vector3(0,0,5), unlocked:false };
const caveGroup = addCave(0, 5);

function unlockSecretCave() {
 if(secretCave.unlocked) return;
 secretCave.unlocked = true;
 gameState.set('player.secondWeekUnlocked', true);
 caveGroup.visible = true;
 addStone(stonesData.find(s => s.isSecret));
 uiManager.showNotification('你发现了隐藏的山洞');
 gameEvents.emit('secret:unlocked');
 
 // 任务面板增加提示
 const questPanel = document.getElementById('quest-panel');
 if(questPanel) {
  const extraHint = document.createElement('div');
  extraHint.className = 'quest-item';
  extraHint.innerHTML = '隐藏山洞已解锁，回到出生点后方';
  questPanel.appendChild(extraHint);
  setTimeout(() => extraHint.remove(), 15000);
 }
}

const allNPCs = [];

function createNPC(name, color, x, z, yOffset = CONFIG.PLAYER.height) {
 const npc = new THREE.Group();
 npc.storyCompleted = false;
 npc.userData = { name: name, dialog: ['……'] };
 npc.add(new THREE.Mesh(new THREE.SphereGeometry(0.7, 24), new THREE.MeshStandardMaterial({ color, transparent: true, opacity: 0.8, emissive: 0x444444, emissiveIntensity: 0.05 })));
 const npcEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 12, 12), new THREE.MeshStandardMaterial({ color: 0x444444, transparent: true, opacity: 0.6 }));
 const eyeL = npcEye.clone(); eyeL.position.set(-0.15, 0.1, 0.65); npc.add(eyeL);
 const eyeR = npcEye.clone(); eyeR.position.set(0.15, 0.1, 0.65); npc.add(eyeR);
 const npcY = getTerrainHeight(x, z) + yOffset;
 npc.position.set(x, npcY, z);
 scene.add(npc);
 
 const labelDiv = document.createElement('div');
 labelDiv.textContent = name;
 labelDiv.style.cssText = 'color:rgba(255,255,255,0.8);font-size:13px;background:rgba(180,200,220,0.12);padding:4px 14px;border-radius:18px;border:1px solid rgba(255,255,255,0.15);pointer-events:auto;cursor:pointer;';
 const label = new CSS2DObject(labelDiv);
 label.position.set(0, 1.0, 0);
 npc.add(label);
 labelDiv.addEventListener('click', e => {
  e.stopPropagation();
  if(!isDialogActive && npc.userData.dialog) startDialog(npc);
 });
 allNPCs.push(npc);
 return npc;
}

// ===================================================================
// 碰撞检测

// ===================================================================
function resolveCollision(newPos, radius) {
 // 如果碰撞检测已关闭，直接返回原始位置
 if(!collisionEnabled) return newPos;
 
 // 稳定性：验证输入位置，防止 NaN 传播
 if(!isFinite(newPos.x) || !isFinite(newPos.z) || !isFinite(newPos.y)) {
  return new THREE.Vector3(0, getTerrainHeight(0,0) + CONFIG.PLAYER.height, 0);
 }
 
 const key = getGridKey(newPos.x, newPos.z);
 const keys = [key];
 const [cx, cz] = key.split(',').map(Number);
 if(!isFinite(cx) || !isFinite(cz)) return newPos;
 
 for(let dx = -1; dx <= 1; dx++)
  for(let dz = -1; dz <= 1; dz++)
   keys.push(`${cx+dx},${cz+dz}`);
 
 let resolved = newPos.clone();
 const MAX_ITER = CONFIG.PERFORMANCE.maxCollisionIter;
 let iter = 0;
 
 for(let k of keys) {
  if(iter >= MAX_ITER) break;
  const cell = grid.get(k);
  if(!cell) continue;
  for(let o of cell) {
   if(iter >= MAX_ITER) break;
   const dx = resolved.x - o.pos.x, dz = resolved.z - o.pos.z;
   const distSq = dx*dx + dz*dz;
   const minDist = radius + o.radius;
   if(distSq < minDist*minDist && distSq > 0.0001) {
    const dist = Math.sqrt(distSq);
    const angle = Math.atan2(dz, dx);
    const pushX = Math.cos(angle) * (minDist - dist);
    const pushZ = Math.sin(angle) * (minDist - dist);
    // 稳定性：防止推送量过大导致传送
    if(isFinite(pushX) && Math.abs(pushX) < 50) resolved.x += pushX;
    if(isFinite(pushZ) && Math.abs(pushZ) < 50) resolved.z += pushZ;
    iter++;
   }
  }
 }
 
 // 稳定性：最终验证
 if(!isFinite(resolved.x)) resolved.x = newPos.x;
 if(!isFinite(resolved.z)) resolved.z = newPos.z;
 // 防止超出地图边界
 resolved.x = Math.max(-250, Math.min(250, resolved.x));
 resolved.z = Math.max(-250, Math.min(250, resolved.z));
 return resolved;
}

// 虚拟摇杆
const dynJoy = document.getElementById('dynamic-joystick'), dynThumb = document.getElementById('dynamic-thumb');
const pointerRoles = new Map();
let joyVec = new THREE.Vector2(0, 0), joyStartX = 0, joyStartY = 0, joyActive = false, yaw = 0, pitch = 0.5;
const pointerLastPos = new Map();
let sensitivity = CONFIG.CAMERA.sensitivity;

renderer.domElement.addEventListener('pointerdown', e => {
 if(gameState.get('ui.menuOpen') || gameState.get('ui.settingsOpen') || gameState.get('ui.inventoryOpen') || gameState.get('ui.aboutOpen')) return;
 if(e.target !== renderer.domElement) return;
 
 let role = null;
 if(e.clientX < innerWidth/2) {
  let h = false;
  for(let r of pointerRoles.values()) if(r === 'joy') h = true;
  if(!h && !joyActive) role = 'joy';
 }
 if(role === null) role = 'view';
 pointerRoles.set(e.pointerId, role);
 pointerLastPos.set(e.pointerId, { x: e.clientX, y: e.clientY });
 
 if(role === 'joy') {
  e.preventDefault();
  joyActive = true;
  joyStartX = e.clientX;
  joyStartY = e.clientY;
  dynJoy.style.display = 'block';
  const joyR = CONFIG.UI.joystickRadius;
  const maxX = innerWidth - joyR*2, maxY = innerHeight - joyR*2;
  dynJoy.style.left = Math.max(0, Math.min(joyStartX - joyR, maxX)) + 'px';
  dynJoy.style.top = Math.max(0, Math.min(joyStartY - joyR, maxY)) + 'px';
  dynThumb.style.left = (joyR - 28) + 'px';
  dynThumb.style.top = (joyR - 28) + 'px';
  joyVec.set(0, 0);
 }
});

renderer.domElement.addEventListener('pointermove', e => {
 if(gameState.get('ui.menuOpen') || gameState.get('ui.settingsOpen') || gameState.get('ui.inventoryOpen') || gameState.get('ui.aboutOpen')) return;
 if(e.target !== renderer.domElement) return;
 
 const role = pointerRoles.get(e.pointerId), last = pointerLastPos.get(e.pointerId);
 if(!last) return;
 
 if(role === 'joy') {
  e.preventDefault();
  const dx = e.clientX - joyStartX, dy = e.clientY - joyStartY;
  const max = 45, dist = Math.sqrt(dx*dx + dy*dy);
  let cx = dx, cy = dy;
  if(dist > max) { cx = dx*max/dist; cy = dy*max/dist; }
  joyVec.set(cx/max, -cy/max);
  dynThumb.style.left = (37 + cx) + 'px';
  dynThumb.style.top = (37 + cy) + 'px';
 } else if(role === 'view') {
  if(!isDialogActive) {
   const dx = e.clientX - last.x, dy = e.clientY - last.y;
   if(Math.abs(dx) > 3 || Math.abs(dy) > 3) {
    yaw -= dx * sensitivity;
    pitch = Math.max(CONFIG.CAMERA.pitchMin, Math.min(CONFIG.CAMERA.pitchMax, pitch + dy * sensitivity));
   }
  }
 }
 pointerLastPos.set(e.pointerId, { x: e.clientX, y: e.clientY });
});

renderer.domElement.addEventListener('pointerup', e => {
 if(gameState.get('ui.menuOpen') || gameState.get('ui.settingsOpen') || gameState.get('ui.inventoryOpen') || gameState.get('ui.aboutOpen')) return;
 if(e.target !== renderer.domElement) return;
 
 const role = pointerRoles.get(e.pointerId);
 if(role === 'joy') {
  e.preventDefault();
  joyActive = false;
  dynJoy.style.display = 'none';
  joyVec.set(0, 0);
 }
 pointerRoles.delete(e.pointerId);
 pointerLastPos.delete(e.pointerId);
});

let mouseLookActive = false;

window.addEventListener('keydown', e => {

document.addEventListener('click', e => {

  mouseLookActive = true;
  renderer.domElement.requestPointerLock();
 }
});

document.addEventListener('mousemove', e => {
 if(mouseLookActive && document.pointerLockElement === renderer.domElement) {
  yaw -= (e.movementX || 0) * sensitivity * 0.5;
 }
});

document.addEventListener('pointerlockchange', () => {
 if(document.pointerLockElement !== renderer.domElement) mouseLookActive = false;
});

renderer.domElement.addEventListener('pointercancel', e => {
 try { renderer.domElement.releasePointerCapture(e.pointerId); } catch(ex) {}
 if(pointerRoles.get(e.pointerId) === 'joy') {
  joyActive = false;
  dynJoy.style.display = 'none';
  joyVec.set(0, 0);
 }
 pointerRoles.delete(e.pointerId);
 pointerLastPos.delete(e.pointerId);
});

function formatTime(sec) {
 if(!sec || !isFinite(sec)) return '0:00';
 const m = Math.floor(sec / 60);
 const s = Math.floor(sec % 60);
 return m + ':' + (s < 10 ? '0' : '') + s;
}

function startProgressUpdate() {
 if(progressTimer) clearInterval(progressTimer);
 progressTimer = setInterval(() => {
  const audio = audioManager.audio;
  const fill = document.getElementById('musicProgressFill');
  const cur = document.getElementById('musicTimeCurrent');
  const tot = document.getElementById('musicTimeTotal');
  if(!audio || !fill) return;
  if(audio.duration && isFinite(audio.duration)) {
   fill.style.width = (audio.currentTime / audio.duration * 100) + '%';
   if(cur) cur.textContent = formatTime(audio.currentTime);
   if(tot) tot.textContent = formatTime(audio.duration);
  }
 }, 250);
}

// iTunes搜索API
function doMusicSearch() {
 if(!musicSearchInput || !musicSearchResults) return;
 var query = musicSearchInput.value.trim();
 if(!query) return;
 musicSearchResults.innerHTML = '<div style="padding:12px;text-align:center;color:var(--text-muted);font-size:11px">搜索中...</div>';

 // 使用iTunes API
 var apiUrl = 'https://itunes.apple.com/search?term=' + encodeURIComponent(query) + '&media=music&limit=20&country=US';
 
 fetch(apiUrl)
  .then(function(r) { return r.json(); })
  .then(function(data) {
   musicSearchResults.innerHTML = '';
   var results = (data && data.results) || [];
   
   if(results.length === 0) {
    musicSearchResults.innerHTML = '<div style="padding:12px;text-align:center;color:var(--text-muted);font-size:11px">未找到结果</div>';
    return;
   }
   
   // 转换为统一格式
   var mapped = results.map(function(t) {
    return {
     name: t.trackName || '未知',
     artist: t.artistName || '',
     pic: (t.artworkUrl60 || '').replace('60x60', '100x100'),
     previewUrl: t.previewUrl || '',
     trackId: t.trackId,
     platform: '预览',
     _isPreview: true
    };
   }).filter(function(t) { return t.previewUrl; });
   
   renderSearchResults(mapped);
  })
  .catch(function(err) {
   musicSearchResults.innerHTML = '<div style="padding:12px;text-align:center;color:#ff6b6b;font-size:11px">搜索失败，请检查网络</div>';
  });
}

function doAddTrack(trackId, name, artist, pic, previewUrl, btn) {

 btn.textContent = '已收藏';
 btn.style.opacity = '0.6';
 btn.style.pointerEvents = 'none';
 
 // iTunes预览版直接添加（30秒）
 var id = 'itunes_' + trackId;
 audioManager.addTrack(id, {
  name: name,
  artist: artist,
  url: previewUrl,
  pic: pic,
  isLocal: true,
  trackId: trackId
 });
 
 if(musicFolders.favorites) {
  // 避免重复添加
  if(musicFolders.favorites.tracks.indexOf(id) === -1) {
   musicFolders.favorites.tracks.push(id);
   saveFolders();
  }
 }
 
 if(uiManager && uiManager.showNotification) {
  uiManager.showNotification('已收藏: ' + name);
 }
}

  const localTag = track.isLocal ? '<span class="track-local">本地</span>' : '';
  const needImportTag = track.needImport && !track.url ? '<span class="track-local">需导入</span>' : '';

    '</div>' +
   '</span>';

function updateMusicUI() {
 const status = document.getElementById('musicStatus');
 const name = document.getElementById('musicTrackName');
 const iconPlay = document.getElementById('iconPlay');
 const iconPause = document.getElementById('iconPause');
 const visualizer = document.getElementById('musicVisualizer');
 const albumIcon = document.getElementById('albumIcon');
 const allTracks = getAllTracks();
 
 // 副标题显示作者，主标题只显示歌曲名
 var artistText = '';
 var titleText = '未选择曲目';
 if(audioManager.currentTrackId && allTracks[audioManager.currentTrackId]) {
  var track = allTracks[audioManager.currentTrackId];
  titleText = track.name || '未选择曲目';
  // 优先使用单独存储的artist字段
  if(track.artist) {
   artistText = track.artist;
  } else {
   // 兼容旧格式 "歌曲名 - 作者"
   var parts = (track.name || '').split(' - ');
   if(parts.length > 1) {
    artistText = parts[1];
    titleText = parts[0];
   }
  }
 }
 if(status) status.textContent = artistText;
 if(name) name.textContent = titleText;
 if(iconPlay) iconPlay.style.display = audioManager.isPlaying ? 'none' : 'block';
 if(iconPause) iconPause.style.display = audioManager.isPlaying ? 'block' : 'none';
 
 // 可视化器控制
 if(visualizer) {
  if(audioManager.isPlaying) {
   visualizer.classList.add('active');
   if(albumIcon) albumIcon.style.display = 'none';
  } else {
   visualizer.classList.remove('active');
   if(albumIcon) albumIcon.style.display = 'block';
  }
 }
 
 buildMusicList();
}

 }

 // 延迟更新 UI，等 audio 事件触发

}

function takeScreenshot() {
 try {
  renderer.render(scene, camera);
  const canvas = renderer.domElement;
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = canvas.width;
  tempCanvas.height = canvas.height;
  const tempCtx = tempCanvas.getContext('2d');
  tempCtx.drawImage(canvas, 0, 0);
  const wmText = 'StarFall';
  tempCtx.save();
  tempCtx.font = '100 48px "Raleway", "Exo 2", sans-serif';
  tempCtx.fillStyle = 'rgba(255, 255, 255, 0.95)';
  tempCtx.letterSpacing = '12px';
  tempCtx.shadowColor = 'rgba(0, 0, 0, 0.3)';
  tempCtx.shadowBlur = 8;
  tempCtx.shadowOffsetY = 2;
  tempCtx.textBaseline = 'bottom';
  const textMetrics = tempCtx.measureText(wmText);
  const textWidth = textMetrics.width + 12 * (wmText.length - 1);
  const margin = 40;
  const x = tempCanvas.width - textWidth - margin;
  const y = tempCanvas.height - margin;
  tempCtx.fillText(wmText, x, y);
  tempCtx.restore();
  const dataURL = tempCanvas.toDataURL('image/png');
  const link = document.createElement('a');
  const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, -5);
  link.download = `星落截图_${timestamp}.png`;
  link.href = dataURL;
  link.click();
  uiManager.showNotification('截图已保存');
 } catch(err) {
  console.error('[Screenshot] Failed:', err);
  uiManager.showNotification('截图失败，请重试');
 }
}

 try {

   _hemiGround.setRGB(0.1, 0.16, 0.1).lerp(new THREE.Color(0.47, 0.6, 0.33), t);

  } else if(hour >= 9 && hour < 16) {

  regionLabels.forEach(label => {
   const dist = pp.distanceTo(label.position);
   label.visible = dist < CONFIG.UI.labelHideDist;
  });
  stoneLabels.forEach(label => {
   const dist = pp.distanceTo(label.parent.position);
   label.visible = dist < CONFIG.UI.labelHideDist;
  });

  // 远处树木优化 - 简单距离裁剪，不修改材质
  const treeVisDist = QUALITY_CFG.treeDist[currentQuality] || 150;
  
  cullableObjects.forEach(obj => {
   if(obj.userData.isTree) {
    const dist = pp.distanceTo(obj.position);
    obj.visible = dist < treeVisDist && frustum.containsPoint(obj.position);
   }
  });

  // 相机
  if(isDialogActive) {
   const npcPos = currentNPC.parent ? currentNPC.parent.position : currentNPC.position;
   const midPoint = new THREE.Vector3().lerpVectors(pp, npcPos, 0.5);
   const dialogDist = CONFIG.CAMERA.dialogDistance;
   const dialogHeight = CONFIG.CAMERA.dialogHeight;
   const camX = pp.x + Math.sin(dialogOrbitAngle) * dialogDist;
   const camZ = pp.z + Math.cos(dialogOrbitAngle) * dialogDist;
   camera.position.set(camX, pp.y + dialogHeight, camZ);
   camera.lookAt(midPoint);
  } else {
   const camDist = CONFIG.CAMERA.distance;
   const camX = pp.x + camDist * Math.sin(yaw) * Math.cos(pitch);
   const camY = pp.y + camDist * Math.sin(pitch) + CONFIG.CAMERA.height;
   const camZ = pp.z + camDist * Math.cos(yaw) * Math.cos(pitch);
   camera.position.set(camX, camY, camZ);
   camera.lookAt(pp.clone().add(new THREE.Vector3(0, 1.8, 0)));
  }
  


  // 接近检测
  if(now - lastProxCheck > CONFIG.PERFORMANCE.proximityCheckInterval) {
   updateStoryConfirms();
   lastProxCheck = now;
  }

  // FPS
  frames++;
  if(now - fpsTimer >= CONFIG.PERFORMANCE.fpsSampleWindow) {
   fps = Math.round(frames * 1000 / (now - fpsTimer));
   var _el_fpsVal = $("fpsVal"); if(_el_fpsVal) _el_fpsVal.textContent = fps;
   fpsTimer = now;
   frames = 0;
  }

  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
 } catch(e) {
  console.error('[Game animate error]', e);
  // 屏幕可见错误提示，便于排查
  const errEl = document.getElementById('animate-error');
  if(errEl) { errEl.textContent = '内部错误: ' + e.message; errEl.style.display = 'block'; }
 }
}

// ===================================================================
// 初始化

// ===================================================================

// 应用画质设置
applyQuality(2);

// 加载存档
if(SaveSystem.load()) {
 updateUI();
 if(gameState.get('player.secondWeekUnlocked')) unlockSecretCave();
 uiManager.showNotification('存档已加载');
}
SaveSystem.loadAudio();
audioManager.preloadAll(); // 预加载所有音乐
SaveSystem.startAutoSave();
animate();

// 加载界面动画
const loadingScreen = document.getElementById('loading-screen');
const loadingText = document.getElementById('loading-text');
const baseText = 'loadinnnnnnng';
let charIndex = 0;

const typeInterval = setInterval(() => {
 if(charIndex < baseText.length) {
  charIndex++;
  loadingText.textContent = baseText.substring(0, charIndex);
 } else {
  clearInterval(typeInterval);
  setTimeout(() => {
   if(loadingScreen) {
    loadingScreen.style.opacity = '0';
    setTimeout(() => {
     loadingScreen.style.display = 'none';
     showTutorial();
    }, 500);
   }
  }, 800);
 }
}, 120);

// 横屏检测
setTimeout(() => { checkOrientation(); }, 1000);

function checkOrientation() {
 const h = document.getElementById('landscape-hint');
 if(innerWidth < innerHeight && /Android|iPhone|iPad|iPod/i.test(navigator.userAgent))
  h.classList.add('show');
 else
  h.classList.remove('show');
}

window.addEventListener('resize', () => {
 camera.aspect = innerWidth / innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth, innerHeight);
 labelRenderer.setSize(innerWidth, innerHeight);
 checkOrientation();
});

// 拍照模式
let photoMode = false;
document.addEventListener('keydown', e => {
 if(e.key === 'p' || e.key === 'P') {
  photoMode = !photoMode;
  (function(){ var _el_game_container = $("game-container"); if(_el_game_container) _el_game_container.classList.toggle('photo-mode', photoMode); })();
  if(photoMode) {
   setTimeout(() => { takeScreenshot(); }, 400);
  }
 }
});

window.addEventListener('beforeunload', () => {
 running = false;
 if(autoTimer) clearInterval(autoTimer);
 [cat, elder].forEach(npc => { if(npc.pendingTimer) clearTimeout(npc.pendingTimer); });
 SaveSystem.save();
 SaveSystem.saveAudio();
 SaveSystem.stopAutoSave();
});
} catch(__initError) {
 var lt = document.getElementById('loading-text');
 if(lt) {
  lt.style.color = '#ff6b6b';
  lt.style.fontSize = '13px';
  lt.style.lineHeight = '1.6';
  lt.textContent = '初始化错误: ' + __initError.message + '\n\n请截图反馈此错误';
 }
 console.error('[StarFall] 初始化失败:', __initError);
}
</script>
